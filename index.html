<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coverly">
<meta name="coverly-version" content="1.1.0-beta-sw11">
<title>Coverly</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<style>
/* ── Design Tokens ── */
:root {
  --bg: #0a0f1e;
  --surface: #111827;
  --card: #161d2e;
  --card-hover: #1c2540;
  --border: rgba(255,255,255,0.07);
  --border-focus: rgba(99,179,237,0.5);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.15);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.15);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.12);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.12);
  --purple: #8b5cf6;
  --text: #f1f5f9;
  --text-2: #94a3b8;
  --text-3: #475569;
  --radius: 16px;
  --radius-sm: 10px;
  --nav-h: 72px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Scrollbars ── */
::-webkit-scrollbar { width: 0; }

/* ── Layout ── */
#app {
  min-height: 100dvh;
  padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 8px);
}

.page { animation: pageIn 0.22s ease both; }
@keyframes pageIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.container { padding: 16px; max-width: 600px; margin: 0 auto; }

/* ── Header ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,15,30,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 14px 16px;
  padding-top: calc(14px + env(safe-area-inset-top, 0px));
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }
.header-logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
.header-logo span { color: var(--red); }
.btn-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 17px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.btn-icon:active { background: var(--card-hover); }

/* ── Bottom Nav ── */
.nav {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  background: rgba(10,15,30,0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bottom);
  z-index: 100;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 0;
  background: none;
  border: none;
  color: var(--text-3);
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 500;
  cursor: pointer;
  transition: color 0.15s;
  letter-spacing: 0.2px;
  text-transform: uppercase;
}
.nav-btn.active { color: var(--text); }
.nav-btn .nav-icon { font-size: 22px; line-height: 1; }
.nav-btn.active .nav-icon { filter: drop-shadow(0 0 6px rgba(255,255,255,0.3)); }

/* ── Buttons ── */
button { cursor: pointer; font-family: 'DM Sans', sans-serif; }

.btn {
  width: 100%;
  padding: 15px 20px;
  margin: 6px 0;
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: -0.1px;
}
.btn:active { transform: scale(0.97); opacity: 0.85; }

.btn-primary { background: var(--red); color: #fff; }
.btn-blue { background: var(--blue); color: #fff; }
.btn-ghost { background: var(--card); border: 1px solid var(--border); color: var(--text); }
.btn-ghost-red { background: var(--red-dim); border: 1px solid rgba(239,68,68,0.25); color: var(--red); }
.btn-sm {
  width: auto;
  padding: 9px 16px;
  font-size: 13px;
  border-radius: var(--radius-sm);
  margin: 3px;
}

/* ── Cards ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin: 10px 0;
  overflow: hidden;
  transition: transform 0.15s, border-color 0.15s;
}
.card:active { transform: scale(0.99); }
.card-body { padding: 16px; }
.card-header { padding: 14px 16px 0; }

/* ── Policy Card ── */
.policy-card { cursor: pointer; }
.policy-card:active { border-color: var(--border-focus); }
.policy-type {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-2);
  margin-bottom: 6px;
}
.policy-name { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 4px; }
.policy-number {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text-2);
  background: rgba(255,255,255,0.05);
  padding: 4px 8px;
  border-radius: 6px;
  display: inline-block;
  margin-bottom: 10px;
}
.policy-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 20px;
  letter-spacing: 0.2px;
}
.badge-green { background: var(--green-dim); color: var(--green); }
.badge-amber { background: var(--amber-dim); color: var(--amber); }
.badge-red { background: var(--red-dim); color: var(--red); }
.badge-blue { background: var(--blue-dim); color: var(--blue); }
.policy-footer {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: rgba(0,0,0,0.15);
}

/* ── Inputs ── */
.field { margin: 10px 0; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-2);
  margin-bottom: 6px;
}
.field input, .field select, .field textarea {
  width: 100%;
  padding: 13px 14px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--border-focus);
}
.field select option { background: var(--surface); }
.field textarea { resize: none; min-height: 80px; }
.field input[type="date"] { color-scheme: dark; }

/* ── Section header ── */
.section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-3);
  padding: 18px 0 8px;
}

/* ── Emergency ── */
.emergency-hero {
  background: linear-gradient(135deg, #1a0a0a 0%, #2a0f0f 100%);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: var(--radius);
  padding: 24px 20px;
  margin: 12px 0;
  text-align: center;
}
.emergency-icon { font-size: 48px; margin-bottom: 8px; }
.emergency-title { font-size: 22px; font-weight: 700; color: var(--red); margin-bottom: 4px; }
.emergency-sub { font-size: 14px; color: var(--text-2); }
.location-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin: 10px 0;
  font-size: 13px;
  color: var(--text-2);
}
.location-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; box-shadow: 0 0 6px var(--green); }

/* ── Empty State ── */
.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-2);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.empty-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.empty-text { font-size: 14px; color: var(--text-2); line-height: 1.5; }

/* ── Home Hero ── */
.home-hero {
  background: linear-gradient(135deg, var(--card) 0%, #1a2035 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 6px;
}
.hero-greeting { font-size: 13px; color: var(--text-2); margin-bottom: 2px; }
.hero-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
.hero-count { font-size: 13px; color: var(--text-2); margin-top: 4px; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: calc(var(--nav-h) + var(--safe-bottom) + 14px);
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(30,40,60,0.95);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 200;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Modal / Sheet ── */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 150;
  backdrop-filter: blur(4px);
  opacity: 0;
  animation: fadeIn 0.2s forwards;
}
@keyframes fadeIn { to { opacity: 1; } }
.sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--border);
  padding: 0 16px calc(var(--safe-bottom) + 16px);
  z-index: 160;
  max-height: 90dvh;
  overflow-y: auto;
  animation: sheetUp 0.25s cubic-bezier(0.4,0,0.2,1) forwards;
}
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: none; } }
.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 16px;
}
.sheet-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 4px; }
.sheet-sub { font-size: 14px; color: var(--text-2); margin-bottom: 20px; }

/* ── Detail actions row ── */
.action-row { display: flex; gap: 8px; margin: 8px 0; }
.action-row .btn { margin: 0; }

/* ── PIN Screen ── */
.pin-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  padding: 40px 24px;
  gap: 0;
}
.pin-logo { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 6px; }
.pin-logo span { color: var(--red); }
.pin-sub { font-size: 15px; color: var(--text-2); margin-bottom: 40px; }
.pin-dots { display: flex; gap: 16px; margin-bottom: 40px; }
.pin-dot {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 2px solid var(--text-3);
  transition: background 0.15s, border-color 0.15s;
}
.pin-dot.filled { background: var(--text); border-color: var(--text); }
.pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 300px; }
.pin-key {
  aspect-ratio: 1;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 22px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: background 0.1s, transform 0.1s;
  display: flex; align-items: center; justify-content: center;
}
.pin-key:active { background: var(--card-hover); transform: scale(0.93); }
.pin-key.danger { color: var(--red); }
.pin-key.confirm { color: var(--green); }
.pin-error { color: var(--red); font-size: 14px; margin-top: -20px; margin-bottom: 20px; min-height: 20px; }

/* ── QR ── */
#qrCanvas { display: none; border-radius: 12px; max-width: 240px; margin: 0 auto; background: #fff; padding: 12px; }
#video { display: none; width: 100%; border-radius: var(--radius); max-height: 320px; object-fit: cover; }

/* ── Scan overlay ── */
.scan-frame {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  margin: 12px 0;
}
.scan-frame::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 2px solid var(--blue);
  border-radius: var(--radius);
  pointer-events: none;
}

/* ── Renewal chip ── */
.renewal-chip {
  font-size: 11px;
  color: var(--text-2);
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ── Settings rows ── */
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.settings-row:last-child { border-bottom: none; }
.settings-label { font-size: 15px; font-weight: 500; }
.settings-desc { font-size: 12px; color: var(--text-2); margin-top: 2px; }

/* ── Toggle ── */
.toggle {
  position: relative;
  width: 46px; height: 26px;
  flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 13px;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  left: 3px; top: 3px;
  background: var(--text-2);
  border-radius: 50%;
  transition: transform 0.2s, background 0.2s;
}
.toggle input:checked + .toggle-slider { background: var(--green-dim); border-color: var(--green); }
.toggle input:checked + .toggle-slider::before { transform: translateX(20px); background: var(--green); }

/* ── Divider ── */
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* ── Danger zone ── */
.danger-section { background: var(--red-dim); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius); padding: 16px; margin-top: 16px; }
.danger-title { font-size: 13px; font-weight: 700; color: var(--red); margin-bottom: 8px; letter-spacing: 0.3px; }

/* ── Dashboard ── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 4px 0 16px; }
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.stat-card.full { grid-column: 1 / -1; }
.stat-icon { font-size: 22px; margin-bottom: 2px; }
.stat-value { font-size: 26px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
.stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-2); }
.stat-card.warn { background: var(--amber-dim); border-color: rgba(245,158,11,0.25); }
.stat-card.danger { background: var(--red-dim); border-color: rgba(239,68,68,0.25); }
.stat-card.good { background: var(--green-dim); border-color: rgba(34,197,94,0.2); }

/* ── Coverage bar ── */
.coverage-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.coverage-row:last-child { border-bottom: none; }
.coverage-icon { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }
.coverage-info { flex: 1; min-width: 0; }
.coverage-name { font-size: 14px; font-weight: 600; }
.coverage-sub { font-size: 12px; color: var(--text-2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.coverage-status { flex-shrink: 0; }

/* ── Timeline / Calendar ── */
.timeline { margin: 0; }
.timeline-month {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-3);
  padding: 16px 0 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.timeline-month::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.timeline-month.is-today { color: var(--blue); }
.timeline-event {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 12px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.timeline-event:active { border-color: var(--border-focus); }
.timeline-event-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 4px;
}
.timeline-event-body { flex: 1; min-width: 0; }
.timeline-event-title { font-size: 14px; font-weight: 600; }
.timeline-event-sub { font-size: 12px; color: var(--text-2); margin-top: 2px; line-height: 1.4; }
.timeline-event-date { font-size: 11px; font-weight: 700; color: var(--text-3); flex-shrink: 0; text-align: right; margin-top: 2px; }
.timeline-event.ev-expired { border-color: rgba(239,68,68,0.3); background: var(--red-dim); }
.timeline-event.ev-urgent { border-color: rgba(245,158,11,0.3); background: var(--amber-dim); }
.timeline-event.ev-soon { border-color: rgba(59,130,246,0.25); }
.timeline-event.ev-renew { border-color: rgba(139,92,246,0.25); background: rgba(139,92,246,0.07); }

/* ── Donut chart ── */
.donut-wrap { display: flex; align-items: center; gap: 20px; padding: 8px 0 4px; }
.donut-svg { flex-shrink: 0; }
.donut-legend { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.donut-legend-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.donut-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.donut-legend-label { color: var(--text-2); flex: 1; }
.donut-legend-count { font-weight: 700; }

/* ── Mini calendar grid ── */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  margin: 8px 0;
}
.cal-day-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-3); text-align: center; padding: 4px 0; letter-spacing: 0.5px; }
.cal-day {
  aspect-ratio: 1;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  position: relative;
  cursor: default;
}
.cal-day.today { background: var(--blue); color: #fff; font-weight: 700; }
.cal-day.has-event::after {
  content: '';
  position: absolute;
  bottom: 3px;
  left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--amber);
}
.cal-day.has-event.expired-event::after { background: var(--red); }
.cal-day.other-month { opacity: 0.25; }
.cal-month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.cal-month-title { font-size: 15px; font-weight: 700; }
.cal-nav-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 16px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* ── Onboarding ── */
.onboard-screen {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  padding: 32px 24px calc(var(--safe-bottom) + 24px);
}
.onboard-step { flex: 1; display: flex; flex-direction: column; justify-content: center; animation: pageIn 0.3s ease both; }
.onboard-icon { font-size: 64px; margin-bottom: 24px; }
.onboard-title { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 12px; line-height: 1.2; }

<script>
'use strict';

/* ═══════════════════════════════════════
   VERSION
═══════════════════════════════════════ */
const APP_VERSION = '1.1.0-beta';
const SW_VERSION  = 'v11';

/* ═══════════════════════════════════════
   ERROR BOUNDARY
═══════════════════════════════════════ */
window.onerror = function(msg, src, line, col, err) {
  console.error('Coverly error:', msg, src, line, col, err);
  const app = document.getElementById('app');
  if (app && app.innerHTML.trim() === '') {
    app.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:32px;text-align:center;font-family:'DM Sans',sans-serif;background:#0a0f1e;color:#f1f5f9">
        <div style="font-size:48px;margin-bottom:16px">⚠️</div>
        <div style="font-size:20px;font-weight:700;margin-bottom:8px">Something went wrong</div>
        <div style="font-size:14px;color:#94a3b8;margin-bottom:32px;line-height:1.6">
          Coverly hit an unexpected error. Your data is safe — tap below to reload.
        </div>
        <button onclick="location.reload()" style="background:#3b82f6;color:#fff;border:none;border-radius:14px;padding:14px 28px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer">
          🔄 Reload App
        </button>
        <div style="font-size:11px;color:#475569;margin-top:24px;font-family:'DM Mono',monospace;max-width:300px;word-break:break-all">${msg}</div>
      </div>`;
  }
  return false; // don't suppress console
};

window.onunhandledrejection = function(e) {
  console.error('Coverly unhandled promise rejection:', e.reason);
};

/* ═══════════════════════════════════════
   HAPTICS
═══════════════════════════════════════ */
function haptic(style = 'light') {
  if (!navigator.vibrate) return;
  const patterns = { light: [8], medium: [15], heavy: [30], success: [10, 50, 10], error: [50, 30, 50] };
  navigator.vibrate(patterns[style] || patterns.light);
}

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let db = null;
let stream = null;
let locationStr = null;
let locationName = null;
let activeTab = 'home';
let appPin = localStorage.getItem('coverly_pin') || null;
let pinEnabled = localStorage.getItem('coverly_pin_enabled') === '1';
let isUnlocked = !pinEnabled;
let scanAnimId = null;
let pendingOCRData = null;
let editingPolicyId = null;
let pendingAttachments = []; // { name, type, data (blob/arrayBuffer) } — flushed on savePolicy

/* ═══════════════════════════════════════
   DATABASE
═══════════════════════════════════════ */
function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('coverlyDB', 3);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('policies')) {
        d.createObjectStore('policies', { keyPath: 'id', autoIncrement: true });
      }
      if (!d.objectStoreNames.contains('documents')) {
        const docStore = d.createObjectStore('documents', { keyPath: 'id', autoIncrement: true });
        docStore.createIndex('policyId', 'policyId', { unique: false });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(); };
    req.onerror = reject;
  });
}

const store = (mode = 'readonly') => db.transaction('policies', mode).objectStore('policies');

function getPolicies() {
  return new Promise(res => {
    const r = store().getAll();
    r.onsuccess = () => res(r.result);
  });
}

function addPolicy(data) {
  return new Promise(res => {
    const r = store('readwrite').add({ ...data, createdAt: Date.now() });
    r.onsuccess = () => res(r.result);
  });
}

function updatePolicy(data) {
  return new Promise(res => {
    const r = store('readwrite').put(data);
    r.onsuccess = () => res();
  });
}

function deletePolicy(id) {
  return new Promise(res => {
    store('readwrite').delete(id);
    res();
  });
}

/* ── Document store helpers ── */
const docStore = (mode = 'readonly') => db.transaction('documents', mode).objectStore('documents');

function getDocumentsForPolicy(policyId) {
  return new Promise(res => {
    const idx = docStore().index('policyId');
    const r = idx.getAll(policyId);
    r.onsuccess = () => res(r.result);
  });
}

function addDocument(doc) {
  return new Promise(res => {
    const r = docStore('readwrite').add({ ...doc, addedAt: Date.now() });
    r.onsuccess = () => res(r.result);
  });
}

function deleteDocument(id) {
  return new Promise(res => {
    docStore('readwrite').delete(id);
    res();
  });
}

function deleteDocumentsForPolicy(policyId) {
  return new Promise(res => {
    const idx = docStore('readwrite').index('policyId');
    const r = idx.getAll(policyId);
    r.onsuccess = () => {
      const docs = r.result;
      if (docs.length === 0) { res(); return; }
      let done = 0;
      docs.forEach(d => {
        const del = docStore('readwrite').delete(d.id);
        del.onsuccess = () => { if (++done === docs.length) res(); };
      });
    };
  });
}

function getAllDocuments() {
  return new Promise(res => {
    const r = docStore().getAll();
    r.onsuccess = () => res(r.result);
  });
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
let toastTimer;
function toast(msg, duration = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}

/* ═══════════════════════════════════════
   LOCATION
═══════════════════════════════════════ */
function getLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    p => {
      locationStr = `${p.coords.latitude.toFixed(5)},${p.coords.longitude.toFixed(5)}`;
      // Reverse geocode with OpenStreetMap
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${p.coords.latitude}&lon=${p.coords.longitude}&format=json`)
        .then(r => r.json())
        .then(d => {
          locationName = d.address?.city || d.address?.town || d.address?.village || d.address?.county || 'Your location';
          renderIfHome();
        })
        .catch(() => { locationName = 'Location found'; });
    },
    () => { locationStr = null; }
  );
}

function renderIfHome() {
  if (activeTab === 'home') renderHome();
  else if (activeTab === 'dashboard') renderDashboard();
}

/* ═══════════════════════════════════════
   POLICY TYPES
═══════════════════════════════════════ */
const POLICY_TYPES = [
  { key: 'car', label: 'Car Insurance', icon: '🚗' },
  { key: 'health', label: 'Health Insurance', icon: '🏥' },
  { key: 'home', label: 'Home Insurance', icon: '🏠' },
  { key: 'life', label: 'Life Insurance', icon: '💚' },
  { key: 'travel', label: 'Travel Insurance', icon: '✈️' },
  { key: 'pet', label: 'Pet Insurance', icon: '🐾' },
  { key: 'business', label: 'Business Insurance', icon: '💼' },
  { key: 'other', label: 'Other', icon: '📋' },
];

function getPolicyMeta(key) {
  return POLICY_TYPES.find(t => t.key === key) || { key: 'other', label: 'Insurance', icon: '📋' };
}

function expiryBadge(expiry) {
  if (!expiry) return '';
  const d = new Date(expiry);
  const now = new Date();
  const days = Math.ceil((d - now) / 86400000);
  if (days < 0) return `<span class="badge badge-red">Expired</span>`;
  if (days <= 30) return `<span class="badge badge-amber">Expires in ${days}d</span>`;
  if (days <= 90) return `<span class="badge badge-blue">Expires in ${Math.round(days/30)}mo</span>`;
  return `<span class="badge badge-green">Active</span>`;
}

/* ═══════════════════════════════════════
   RENDER HELPERS
═══════════════════════════════════════ */
function headerHTML(title, showBack = true) {
  return `<div class="header">
    ${showBack
      ? `<button class="btn-icon" onclick="goBack()">←</button>`
      : `<div style="width:38px"></div>`}
    <span class="header-title">${title}</span>
    <div style="width:38px"></div>
  </div>`;
}

function homeHeaderHTML(policyCount) {
  return `<div class="header">
    <span class="header-logo">Cover<span>ly</span></span>
    <div style="display:flex;gap:8px">
      ${policyCount > 0 ? `<button class="btn-icon" onclick="exportQR()" title="Export QR">⬆️</button>` : ''}
      <button class="btn-icon" onclick="renderSettings()" title="Settings">⚙️</button>
    </div>
  </div>`;
}

function navHTML(active) {
  const tabs = [
    { id: 'home', icon: '🏠', label: 'Vault' },
    { id: 'dashboard', icon: '📊', label: 'Overview' },
    { id: 'emergency', icon: '🚨', label: 'Emergency' },
    { id: 'add', icon: '＋', label: 'Add' },
  ];
  return `<div class="nav">${tabs.map(t =>
    `<button class="nav-btn ${active === t.id ? 'active' : ''}" onclick="navTap('${t.id}')">
      <span class="nav-icon">${t.icon}</span>${t.label}
    </button>`
  ).join('')}</div>`;
}

function navTap(tab) {
  activeTab = tab;
  stopCamera();
  if (tab === 'home') renderHome();
  else if (tab === 'dashboard') renderDashboard();
  else if (tab === 'emergency') renderEmergency();
  else if (tab === 'add') showAddSheet();
}

// ── Sheet that appears when tapping Add in nav ──
function showAddSheet() {
  showSheet(`
    <div class="sheet-title">Add Policy</div>
    <div class="sheet-sub">How would you like to add your insurance policy?</div>

    <button class="btn btn-primary" onclick="closeSheet();startOCRPDF()" style="display:flex;align-items:center;gap:10px;justify-content:flex-start;padding:16px 18px">
      <span style="font-size:22px">📄</span>
      <span style="text-align:left">
        <span style="display:block;font-size:15px">Upload PDF</span>
        <span style="display:block;font-size:12px;opacity:0.75;font-weight:400;margin-top:1px">Best results — reads text directly</span>
      </span>
    </button>

    <button class="btn btn-ghost" onclick="closeSheet();renderAdd()" style="display:flex;align-items:center;gap:10px;justify-content:flex-start;padding:16px 18px;margin-top:4px">
      <span style="font-size:22px">✏️</span>
      <span style="text-align:left">
        <span style="display:block;font-size:15px">Enter Manually</span>
        <span style="display:block;font-size:12px;opacity:0.75;font-weight:400;margin-top:1px">Type in your policy details</span>
      </span>
    </button>

    <button class="btn btn-ghost" onclick="closeSheet();showScanDocSheet()" style="display:flex;align-items:center;gap:10px;justify-content:flex-start;padding:16px 18px;margin-top:4px">
      <span style="font-size:22px">📷</span>
      <span style="text-align:left">
        <span style="display:block;font-size:15px">Scan Document</span>

}

function showScanDocSheet() {
  showSheet(`
    <div class="sheet-title">📷 Scan Document</div>

function startQRScanDirect() {

function goBack() {
  stopCamera();
  activeTab = 'home';
  renderHome();
}

/* ═══════════════════════════════════════
   HOME
═══════════════════════════════════════ */
async function renderHome() {
  activeTab = 'home';
  const policies = await getPolicies();
  const count = policies.length;
  const now = new Date();

  // Compute snapshot stats
  const withExpiry   = policies.filter(p => p.expiry);
  const expired      = withExpiry.filter(p => new Date(p.expiry) < now);
  const expiring30   = withExpiry.filter(p => { const d = daysUntil(p.expiry); return d >= 0 && d <= 30; });
  const expiring90   = withExpiry.filter(p => { const d = daysUntil(p.expiry); return d > 30 && d <= 90; });
  const activeCount  = count - expired.length;

  // Next policy to expire (soonest future expiry)
  const upcoming = withExpiry
    .filter(p => daysUntil(p.expiry) >= 0)
    .sort((a, b) => new Date(a.expiry) - new Date(b.expiry));
  const nextExpiring = upcoming[0] || null;

  let html = homeHeaderHTML(count) + `<div class="container page">`;

  // ── Hero: greeting + emergency only ──
  html += `<div class="home-hero">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div>
        <div class="hero-greeting">Good ${getTimeOfDay()}</div>
        <div class="hero-title" style="font-size:20px">${count === 0 ? 'Welcome to Coverly' : `${count} polic${count === 1 ? 'y' : 'ies'} stored`}</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="navTap('emergency')" style="display:flex;align-items:center;gap:6px;padding:10px 16px;font-size:14px;flex-shrink:0">
        🚨 Emergency
      </button>
    </div>`;

  if (count === 0) {
    // Empty state inline — prompt to add first policy
    html += `<div style="text-align:center;padding:16px 0 8px">
      <div style="font-size:36px;margin-bottom:8px">🛡️</div>
      <div style="font-size:14px;color:var(--text-2);margin-bottom:12px">Add your first policy to get started</div>
      <button class="btn btn-primary" onclick="showAddSheet()" style="margin:0">＋ Add First Policy</button>
    </div>`;
  } else {
    // ── Coverage snapshot strip ──
    html += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:${(expired.length > 0 || expiring30.length > 0) ? '10' : '0'}px">
      <div style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:800;color:var(--green)">${activeCount}</div>
        <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-2);margin-top:2px">Active</div>
      </div>
      <div style="background:${expiring30.length > 0 ? 'rgba(245,158,11,0.12)' : 'rgba(255,255,255,0.04)'};border:1px solid ${expiring30.length > 0 ? 'rgba(245,158,11,0.25)' : 'var(--border)'};border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:800;color:${expiring30.length > 0 ? 'var(--amber)' : 'var(--text-3)'}">${expiring30.length + expiring90.length}</div>

function initPullToRefresh() {
  const app = document.getElementById('app');
  if (!app) return;
  let startY = 0, pulling = false, triggered = false;
  const THRESHOLD = 72;

  app.addEventListener('touchstart', e => {
    // Only activate when scrolled to top
    if (window.scrollY > 4) return;
    startY = e.touches[0].clientY;
    pulling = true;
    triggered = false;
  }, { passive: true });

  app.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy < 10) return;
    const indicator = document.getElementById('ptrIndicator');
    if (!indicator) return;
    const h = Math.min(dy * 0.45, 56);
    indicator.style.height = h + 'px';
    indicator.classList.toggle('visible', h > 20);
    if (h >= THRESHOLD * 0.45 && !triggered) triggered = true;
  }, { passive: true });

  app.addEventListener('touchend', async () => {
    if (!pulling) return;
    pulling = false;
    const indicator = document.getElementById('ptrIndicator');
    if (indicator) {
      indicator.style.height = '0';
      indicator.classList.remove('visible');
    }
    if (triggered) {
      haptic('light');
      await renderHome();
    }
  }, { passive: true });
}

function getTimeOfDay() {
  const h = new Date().getHours();
  if (h < 12) return 'morning';
  if (h < 18) return 'afternoon';
  return 'evening';
}

function daysUntil(expiryStr) {
  if (!expiryStr) return null;
  return Math.ceil((new Date(expiryStr) - new Date()) / 86400000);
}

// ── Donut SVG ──
function buildDonutSVG(segments, total) {
  const size = 88, cx = 44, cy = 44, r = 32, stroke = 14;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  let arcs = '';
  for (const s of segments) {
    const pct = s.count / total;
    const dash = pct * circ;
    arcs += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${stroke}"
      stroke-dasharray="${dash} ${circ - dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})" opacity="0.85"/>`;
    offset += dash;
  }

  return `<div class="donut-wrap">
    <svg class="donut-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="${stroke}"/>
      ${arcs}
      <text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="16" font-weight="800" font-family="DM Sans,sans-serif">${total}</text>
      <text x="${cx}" y="${cy+14}" text-anchor="middle" dominant-baseline="middle" fill="#94a3b8" font-size="8" font-family="DM Sans,sans-serif">policies</text>
    </svg>
    <div class="donut-legend">
      ${segments.map(s => `<div class="donut-legend-row">
        <div class="donut-legend-dot" style="background:${s.color}"></div>
        <span class="donut-legend-label">${s.label}</span>
        <span class="donut-legend-count">${s.count}</span>
      </div>`).join('')}
    </div>
  </div>`;
}

// ── Mini Calendar ──
function buildMiniCalendar(policies) {
  const y = calViewYear, m = calViewMonth;
  const monthName = new Date(y, m, 1).toLocaleString('en-GB', { month: 'long', year: 'numeric' });
  const today = new Date();

  // Map expiry dates to day numbers this month
  const eventDays = {};
  policies.forEach(p => {
    if (!p.expiry) return;
    const d = new Date(p.expiry);
    if (d.getFullYear() === y && d.getMonth() === m) {
      const day = d.getDate();
      const isExpired = d < today;
      eventDays[day] = isExpired ? 'expired' : 'upcoming';
    }
    // Renewal reminder: 30 days before expiry
    const renewal = new Date(p.expiry);
    renewal.setDate(renewal.getDate() - 30);
    if (renewal.getFullYear() === y && renewal.getMonth() === m) {
      const rday = renewal.getDate();
      if (!eventDays[rday]) eventDays[rday] = 'renew';
    }
  });

  const firstDay = new Date(y, m, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const daysInPrev = new Date(y, m, 0).getDate();

  const dayLabels = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  let cells = dayLabels.map(l => `<div class="cal-day-label">${l}</div>`).join('');

  // Leading days from prev month
  for (let i = firstDay - 1; i >= 0; i--) {
    cells += `<div class="cal-day other-month">${daysInPrev - i}</div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = today.getFullYear() === y && today.getMonth() === m && today.getDate() === d;
    const evt = eventDays[d];
    cells += `<div class="cal-day ${isToday ? 'today' : ''} ${evt ? 'has-event' : ''} ${evt === 'expired' ? 'expired-event' : ''}" title="${evt ? (evt === 'expired' ? 'Expired' : evt === 'renew' ? 'Renewal reminder' : 'Policy expires') : ''}">${d}</div>`;
  }

  // Trailing days
  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
  for (let d = 1; d <= totalCells - firstDay - daysInMonth; d++) {
    cells += `<div class="cal-day other-month">${d}</div>`;
  }

  return `
    <div class="cal-month-nav">
      <button class="cal-nav-btn" id="calPrev">‹</button>
      <span class="cal-month-title">${monthName}</span>
      <button class="cal-nav-btn" id="calNext">›</button>
    </div>
    <div class="cal-grid">${cells}</div>
    <div style="display:flex;gap:12px;margin-top:8px;font-size:11px;color:var(--text-2)">
      <span>🟡 Expires / 🔴 Expired</span>
      <span style="color:var(--purple)">● Renew reminder</span>
    </div>`;
}

function refreshCalendar(policies) {
  const card = document.querySelector('.cal-grid')?.closest('.card-body');
  if (!card) return;
  card.innerHTML = buildMiniCalendar(policies);
  document.getElementById('calPrev')?.addEventListener('click', () => {
    calViewMonth--;
    if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
    refreshCalendar(policies);
  });
  document.getElementById('calNext')?.addEventListener('click', () => {
    calViewMonth++;
    if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
    refreshCalendar(policies);
  });
}

// ── Timeline events builder ──
function buildTimelineEvents(policies, now) {
  const events = [];
  policies.forEach(p => {
    const meta = getPolicyMeta(p.type);
    if (!p.expiry) return;
    const expDate = new Date(p.expiry);
    const days = Math.ceil((expDate - now) / 86400000);

    // Renewal reminder event (30 days before)
    const renewDate = new Date(expDate);
    renewDate.setDate(renewDate.getDate() - 30);

    if (days < 0) {
      events.push({ date: expDate, type: 'expired', policy: p, meta, days, label: 'Expired', color: '#ef4444', cls: 'ev-expired' });
    } else {
      if (days <= 30) {
        events.push({ date: expDate, type: 'urgent', policy: p, meta, days, label: `Expires in ${days} day${days===1?'':'s'}`, color: '#f59e0b', cls: 'ev-urgent' });
      } else {
        events.push({ date: expDate, type: 'expiry', policy: p, meta, days, label: 'Policy expires', color: '#3b82f6', cls: '' });
      }
      // Only show renew reminder if it's in the future
      if (renewDate > now && days > 30) {
        events.push({ date: renewDate, type: 'renew', policy: p, meta, days: days - 30, label: '💡 Good time to start renewing', color: '#8b5cf6', cls: 'ev-renew' });
      }
    }
  });

  // Sort: expired first (most recent), then upcoming by date
  events.sort((a, b) => {
    if (a.type === 'expired' && b.type !== 'expired') return -1;
    if (b.type === 'expired' && a.type !== 'expired') return 1;
    return a.date - b.date;
  });

  return events;
}

function buildTimeline(events) {
  let html = '<div class="timeline">';
  let lastMonthKey = null;

  events.forEach(ev => {
    const monthKey = `${ev.date.getFullYear()}-${ev.date.getMonth()}`;
    const isNow = new Date().getMonth() === ev.date.getMonth() && new Date().getFullYear() === ev.date.getFullYear();

    if (monthKey !== lastMonthKey) {
      lastMonthKey = monthKey;
      const label = ev.type === 'expired' && ev.date < new Date()
        ? ev.date.toLocaleString('en-GB', { month: 'long', year: 'numeric' })
        : ev.date.toLocaleString('en-GB', { month: 'long', year: 'numeric' });
      html += `<div class="timeline-month ${isNow ? 'is-today' : ''}">${label}</div>`;
    }

    const dateStr = ev.date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });

    html += `<div class="timeline-event ${ev.cls}" onclick="renderPolicyDetail(${ev.policy.id})">
      <div class="timeline-event-dot" style="background:${ev.color}"></div>
      <div class="timeline-event-body">
        <div class="timeline-event-title">${ev.meta.icon} ${esc(ev.policy.insurer || ev.meta.label)}</div>
        <div class="timeline-event-sub">${ev.label}${ev.type === 'renew' ? ' — policy renews 30 days later' : ''}</div>
      </div>
      <div class="timeline-event-date">${dateStr}</div>
    </div>`;
  });

  html += '</div>';
  return html;
}

async function renderPolicyDetail(id) {

  const meta = getPolicyMeta(p.type);

  // Build preview URLs for images
  const docsWithPreviews = await Promise.all(docs.map(async doc => {
    const isPDF = doc.type === 'application/pdf' || (doc.name || '').toLowerCase().endsWith('.pdf');
    if (!isPDF && doc.data) {
      doc.previewUrl = URL.createObjectURL(new Blob([doc.data], { type: doc.type }));
    }
    return doc;
  }));

  let html = headerHTML(`${meta.icon} ${meta.label}`) + `<div class="container page">`;

  html += `<div class="card">
    <div class="card-body">
      <div class="policy-type">Insurer</div>
      <div class="policy-name">${esc(p.insurer || 'Unknown')}</div>
      <div class="policy-badges">${expiryBadge(p.expiry)}</div>
      <div class="section-label">Policy Number</div>

    insurer: document.getElementById('f_insurer').value.trim(),
    number: document.getElementById('f_number').value.trim(),
    phone: document.getElementById('f_phone').value.trim(),
    expiry: document.getElementById('f_expiry').value,
    emergencyContact: document.getElementById('f_emergency').value.trim(),
    premium: parseFloat(document.getElementById('f_premium')?.value) || null,
    notes: document.getElementById('f_notes').value.trim(),
  };

  if (!data.number) { haptic('error'); toast('⚠️ Policy number is required'); return; }

  if (editingPolicyId) {
    const policies = await getPolicies();
    const existing = policies.find(x => x.id === editingPolicyId);
    await updatePolicy({ ...existing, ...data });
    await flushPendingAttachments(editingPolicyId);
    haptic('success');
    toast('✅ Policy updated');
  } else {
    const newId = await addPolicy(data);
    await flushPendingAttachments(newId);
    haptic('success');
    toast('✅ Policy saved');
  }

  editingPolicyId = null;
  activeTab = 'home';
  await renderHome();
}

// ── Build thumbnail HTML for a list of doc objects (saved or pending) ──
// mode: 'edit' shows delete buttons, 'view' shows tap-to-open only
function buildDocThumbs(docs, mode = 'view', pendingOffset = 0) {
  if (!docs || docs.length === 0) return '';
  return docs.map((doc, i) => {
    const idx = mode === 'pending' ? pendingOffset + i : i;
    const isPDF = doc.type === 'application/pdf' || (doc.name || '').toLowerCase().endsWith('.pdf');
    const delBtn = (mode === 'edit' || mode === 'pending')
      ? `<button class="doc-thumb-del" onclick="event.stopPropagation();${mode === 'pending' ? `removePendingAttachment(${i})` : `deleteSavedDoc(${doc.id})`}" title="Remove">✕</button>`
      : '';
    const clickHandler = mode === 'pending'
      ? `openPendingDocViewer(${i})`
      : `openSavedDocViewer(${doc.id})`;
    if (isPDF) {
      const shortName = (doc.name || 'document.pdf').length > 12
        ? (doc.name || 'document.pdf').slice(0, 10) + '…'
        : (doc.name || 'document.pdf');
      return `<div class="doc-thumb" onclick="${clickHandler}">
        ${delBtn}
        <div class="doc-thumb-pdf"><span>📄</span>${esc(shortName)}</div>
      </div>`;
    } else {
      // For saved docs, we use a data URL stored at doc.previewUrl (set when rendering)
      // For pending, we use pendingThumbUrls[i]
      const imgSrc = mode === 'pending'
        ? `id="pendingThumb_${i}"`
        : `src="${esc(doc.previewUrl || '')}"`;
      return `<div class="doc-thumb" onclick="${clickHandler}">
        ${delBtn}
        <img ${imgSrc} alt="${esc(doc.name || 'image')}" style="width:100%;height:100%;object-fit:cover">
      </div>`;
    }
  }).join('');
}

// Pending attachment thumb URLs (object URLs, revoked on save/cancel)
let pendingThumbUrls = [];

function removePendingAttachment(i) {
  if (pendingThumbUrls[i]) URL.revokeObjectURL(pendingThumbUrls[i]);
  pendingAttachments.splice(i, 1);
  pendingThumbUrls.splice(i, 1);
  refreshAttachSection();
}

function refreshAttachSection() {
  const section = document.getElementById('attachSection');
  if (!section) return;
  section.innerHTML = buildAttachSectionInner();
  // Re-stamp thumb img srcs for pending images
  pendingAttachments.forEach((doc, i) => {
    const isPDF = doc.type === 'application/pdf' || (doc.name || '').toLowerCase().endsWith('.pdf');
    if (!isPDF) {
      const el = document.getElementById(`pendingThumb_${i}`);
      if (el) el.src = pendingThumbUrls[i] || '';
    }
  });
}

function buildAttachSectionInner() {
  const hasPending = pendingAttachments.length > 0;
  return `
    <div class="section-label" style="margin-top:14px">Documents</div>
    <div class="doc-scroll" id="docScrollRow">
      ${buildDocThumbs(pendingAttachments, 'pending')}
      <button class="doc-add-btn" onclick="triggerDocAttach()" title="Attach document">＋</button>
    </div>
    <div style="font-size:12px;color:var(--text-3);margin-bottom:8px;line-height:1.5">
      Attach photos or PDFs of this policy (stored privately on your device).${hasPending ? ` <b style="color:var(--text-2)">${pendingAttachments.length} pending</b> — will save with policy.` : ''}
    </div>
  `;
}

// Called when editing an existing policy — loads saved docs and shows them
async function buildAttachSectionForEdit(policyId) {
  const saved = await getDocumentsForPolicy(policyId);
  // Build preview URLs for images
  const withPreviews = await Promise.all(saved.map(async doc => {
    const isPDF = doc.type === 'application/pdf';
    if (!isPDF && doc.data) {
      doc.previewUrl = URL.createObjectURL(new Blob([doc.data], { type: doc.type }));
    }
    return doc;
  }));

  const section = document.getElementById('attachSection');
  if (!section) return;
  section.innerHTML = `
    <div class="section-label" style="margin-top:14px">Documents</div>
    <div class="doc-scroll" id="docScrollRow">
      ${buildDocThumbs(withPreviews, 'edit')}
      ${buildDocThumbs(pendingAttachments, 'pending', withPreviews.length)}
      <button class="doc-add-btn" onclick="triggerDocAttach()" title="Attach document">＋</button>
    </div>
    <div style="font-size:12px;color:var(--text-3);margin-bottom:8px;line-height:1.5">
      Tap a document to view it. Tap ✕ to remove.${pendingAttachments.length > 0 ? ` <b style="color:var(--text-2)">${pendingAttachments.length} new</b> — will save with policy.` : ''}
    </div>
  `;
  // Stamp image srcs for pending
  pendingAttachments.forEach((doc, i) => {
    const isPDF = doc.type === 'application/pdf';
    if (!isPDF) {
      const el = document.getElementById(`pendingThumb_${withPreviews.length + i}`);
      if (el) el.src = pendingThumbUrls[i] || '';
    }
  });
}

async function deleteSavedDoc(docId) {
  await deleteDocument(docId);
  // Refresh the attach section (need policyId — read from editingPolicyId)
  if (editingPolicyId) buildAttachSectionForEdit(editingPolicyId);
  toast('Document removed');

function triggerDocAttach() {
  document.getElementById('docAttachInput').click();
}

document.getElementById('docAttachInput').addEventListener('change', async e => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;

  const MAX_SIZE = 20 * 1024 * 1024; // 20 MB
  if (file.size > MAX_SIZE) {
    toast('⚠️ File too large — max 20 MB');
    return;
  }

  const isPDF = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
  const buf = await file.arrayBuffer();
  pendingAttachments.push({ name: file.name, type: file.type || (isPDF ? 'application/pdf' : 'image/jpeg'), data: buf });

  if (!isPDF) {
    pendingThumbUrls.push(URL.createObjectURL(file));
  } else {
    pendingThumbUrls.push(null);
  }

  // Refresh section (edit vs new context)
  if (editingPolicyId) {
    buildAttachSectionForEdit(editingPolicyId);
  } else {
    refreshAttachSection();
  }
});

// ── Save pending attachments to DB after policy is saved ──
async function flushPendingAttachments(policyId) {
  for (const doc of pendingAttachments) {
    await addDocument({ policyId, name: doc.name, type: doc.type, data: doc.data });
  }
  // Revoke any object URLs
  pendingThumbUrls.forEach(u => { if (u) URL.revokeObjectURL(u); });
  pendingAttachments = [];
  pendingThumbUrls = [];
}

// ── Viewers ──
async function openSavedDocViewer(docId) {
  const docs = await getAllDocuments();
  const doc = docs.find(d => d.id === docId);
  if (!doc) return;
  const isPDF = doc.type === 'application/pdf' || (doc.name || '').toLowerCase().endsWith('.pdf');
  const blob = new Blob([doc.data], { type: doc.type });
  openDocViewer(doc.name, isPDF, blob);
}

function openPendingDocViewer(i) {
  const doc = pendingAttachments[i];
  if (!doc) return;
  const isPDF = doc.type === 'application/pdf' || (doc.name || '').toLowerCase().endsWith('.pdf');
  const blob = new Blob([doc.data], { type: doc.type });
  openDocViewer(doc.name, isPDF, blob);
}

function openDocViewer(name, isPDF, blob) {
  // Remove any existing viewer
  document.getElementById('docViewer')?.remove();

  const viewer = document.createElement('div');
  viewer.className = 'doc-viewer-backdrop';
  viewer.id = 'docViewer';

  viewer.innerHTML = `
    <div class="doc-viewer-header">
      <button class="btn-icon" onclick="closeDocViewer()">✕</button>
      <div class="doc-viewer-title">${esc(name || 'Document')}</div>
      <button class="btn-icon" onclick="downloadDocBlob()" title="Download">⬇️</button>
    </div>
    <div class="doc-viewer-body" id="docViewerBody">
      <div style="color:#94a3b8;font-size:14px;padding:40px">Loading…</div>
    </div>
  `;
  document.body.appendChild(viewer);

  // Store blob for download
  viewer._blob = blob;
  viewer._name = name;

  const body = document.getElementById('docViewerBody');

  if (isPDF) {
    // Render PDF pages using PDF.js
    const url = URL.createObjectURL(blob);
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

    const container = document.createElement('div');
    container.style.cssText = 'width:100%;display:flex;flex-direction:column;gap:8px;padding:0 8px 16px;';
    body.innerHTML = '';
    body.appendChild(container);

    pdfjsLib.getDocument({ url }).promise.then(async pdf => {
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: window.devicePixelRatio || 2 });
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        canvas.style.cssText = `width:100%;height:auto;border-radius:4px;background:#fff;display:block;`;
        container.appendChild(canvas);
        await page.render({ canvasContext: ctx, viewport }).promise;
      }
      URL.revokeObjectURL(url);
    }).catch(() => {
      body.innerHTML = '<div style="color:#ef4444;font-size:14px;padding:40px">Could not render PDF</div>';
      URL.revokeObjectURL(url);
    });
  } else {
    // Image
    const url = URL.createObjectURL(blob);
    const img = document.createElement('img');
    img.src = url;
    img.style.cssText = 'max-width:100%;height:auto;border-radius:4px;';
    img.onload = () => URL.revokeObjectURL(url);
    body.innerHTML = '';
    body.appendChild(img);
  }
}

function closeDocViewer() {
  document.getElementById('docViewer')?.remove();
}

function downloadDocBlob() {
  const viewer = document.getElementById('docViewer');
  if (!viewer || !viewer._blob) return;
  const url = URL.createObjectURL(viewer._blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = viewer._name || 'document';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* ═══════════════════════════════════════
   QR EXPORT
═══════════════════════════════════════ */
// Multi-QR state
let qrChunks = [];
let qrChunkIndex = 0;

async function exportQR() {
  const policies = await getPolicies();
  if (!policies.length) { toast('No policies to export'); return; }

  // Strip document blobs — QR is for policy metadata only
  const policiesStripped = policies.map(({ id, ...rest }) => rest);
  const fullData = JSON.stringify({ coverly: true, v: 2, policies: policiesStripped });

  // Try single QR first
  const MAX_CHUNK = 1200; // conservative QR payload limit in bytes
  if (fullData.length <= MAX_CHUNK) {
    qrChunks = [fullData];
  } else {
    // Split into chunks with envelope: { cov_chunk: true, i: index, t: total, d: data }
    const chunkSize = MAX_CHUNK - 60; // leave room for envelope overhead
    const raw = JSON.stringify({ coverly: true, v: 2, policies: policiesStripped });
    qrChunks = [];
    for (let pos = 0; pos < raw.length; pos += chunkSize) {
      qrChunks.push(raw.slice(pos, pos + chunkSize));
    }
    // Re-wrap each chunk
    qrChunks = qrChunks.map((d, i) =>
      JSON.stringify({ cov_chunk: true, i, t: qrChunks.length, d })
    );
  }

  qrChunkIndex = 0;
  renderQRExportScreen(policies.length);
}

function startQRScan() {
  const area = document.getElementById('scanArea');
  if (!area) return;
  const vid = document.getElementById('video');
  area.innerHTML = `<div class="scan-frame"></div><button class="btn btn-ghost" onclick="stopCamera();document.getElementById('scanArea').innerHTML=''" style="margin-top:8px">✕ Cancel</button>`;
  area.querySelector('.scan-frame').appendChild(vid);
  vid.style.display = 'block';

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(s => {
      stream = s;
      vid.srcObject = s;
      vid.play();
      scanQRLoop();
    })
    .catch(() => toast('Camera permission denied'));
}

function scanQRLoop() {
  const vid = document.getElementById('video');
  if (!vid || !stream) return;
  if (vid.readyState === 4) {
    const c = document.createElement('canvas');
    c.width = vid.videoWidth; c.height = vid.videoHeight;
    c.getContext('2d').drawImage(vid, 0, 0);
    const d = c.getContext('2d').getImageData(0, 0, c.width, c.height);
    const code = jsQR(d.data, c.width, c.height);
    if (code) {
      stopCamera();
      importQRData(code.data);
      return;
    }
  }
  scanAnimId = requestAnimationFrame(scanQRLoop);
}

// Chunk reassembly buffer
let qrImportChunks = {}; // index -> data string
let qrImportTotal = null;

async function importQRData(raw) {
  try {
    const parsed = JSON.parse(raw);

    // ── Chunked QR ──
    if (parsed.cov_chunk === true) {
      const { i, t, d } = parsed;
      qrImportChunks[i] = d;
      qrImportTotal = t;

      const received = Object.keys(qrImportChunks).length;
      if (received < t) {
        // Need more chunks — keep scanner open and show progress
        stopCamera();
        showSheet(`
          <div class="sheet-title">📲 Scanning QR Codes</div>
          <div class="sheet-sub">Received ${received} of ${t} QR codes. Scan the next one.</div>
          <div style="display:flex;gap:6px;justify-content:center;margin:16px 0">
            ${Array.from({ length: t }, (_, idx) =>
              `<div style="width:12px;height:12px;border-radius:50%;background:${qrImportChunks[idx] !== undefined ? 'var(--green)' : 'var(--border)'}"></div>`
            ).join('')}
          </div>
          <button class="btn btn-primary" onclick="closeSheet();startQRScanDirect()">📷 Scan Next QR</button>
          <button class="btn btn-ghost" onclick="qrImportChunks={};qrImportTotal=null;closeSheet();" style="margin-top:4px">Cancel</button>
        `);
        return;
      }

      // All chunks received — reassemble
      const fullRaw = Array.from({ length: t }, (_, idx) => qrImportChunks[idx]).join('');
      qrImportChunks = {};
      qrImportTotal = null;
      closeSheet();
      await importQRData(fullRaw); // recurse with reassembled payload
      return;
    }

    // ── Single QR ──
    const list = parsed.coverly ? parsed.policies : parsed;
    if (!Array.isArray(list)) throw new Error();
    for (const p of list) {
      const { id, ...rest } = p;
      await addPolicy(rest);
    }
    toast(`✅ Imported ${list.length} polic${list.length === 1 ? 'y' : 'ies'}`);
    activeTab = 'home';
    renderHome();
  } catch {
    toast('⚠️ Invalid QR code');
    renderScan();
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (scanAnimId) { cancelAnimationFrame(scanAnimId); scanAnimId = null; }
  const vid = document.getElementById('video');
  if (vid) { vid.style.display = 'none'; vid.srcObject = null; }
}

// ── Image preprocessing: greyscale + contrast boost ──
function preprocessImageForOCR(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      // Scale down large images to max 2000px wide for speed
      const MAX = 2000;
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      // Convert to greyscale and boost contrast
      const id = ctx.getImageData(0, 0, w, h);
      const d = id.data;
      for (let i = 0; i < d.length; i += 4) {
        const grey = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
        // contrast stretch: make light→lighter, dark→darker
        const c = Math.min(255, Math.max(0, (grey - 128) * 1.4 + 128));
        d[i] = d[i+1] = d[i+2] = c;
      }
      ctx.putImageData(id, 0, 0);
      URL.revokeObjectURL(url);
      canvas.toBlob(resolve, 'image/png');
    };
    img.src = url;
  });
}

// ── Extract text directly from PDF text layer (no OCR needed for digital PDFs) ──
async function extractTextFromPDF(file) {
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

  // Extract text from ALL pages and join — insurance docs often span 2-3 pages
  let fullText = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    // Join items preserving line breaks by grouping by Y position
    const lines = {};
    content.items.forEach(item => {
      const y = Math.round(item.transform[5]); // Y coordinate
      if (!lines[y]) lines[y] = [];
      lines[y].push(item.str);
    });
    // Sort lines top→bottom (higher Y = higher on page in PDF coords)
    const sortedYs = Object.keys(lines).map(Number).sort((a, b) => b - a);
    fullText += sortedYs.map(y => lines[y].join(' ')).join('\n') + '\n';
  }
  return fullText;
}

// ── Render PDF to image (fallback for scanned/image-based PDFs) ──
async function pdfToImageBlob(file) {
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const page = await pdf.getPage(1);
  const viewport = page.getViewport({ scale: 3.0 }); // 3x for better OCR accuracy

  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;

  return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
}

// ── Master extraction — works on both PDF text layer output and OCR text ──
function extractPolicyData(rawText) {
  const text = rawText.replace(/\r/g, '\n').replace(/[ \t]+/g, ' ').trim();
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const flat  = text.replace(/\n+/g, ' ');
  const lower = flat.toLowerCase();

  let number = '', phone = '', insurer = '', expiry = '', type = 'other';
  const notes = [];

  // ══ HELPER: Next-line label→value ══
  // Many insurance PDFs put the label on one line and the value on the next.
  // e.g.  "CERTIFICATE NUMBER\nCFYAM24-8368292"
  function nextLineValue(labelPattern) {
    for (let i = 0; i < lines.length - 1; i++) {
      if (labelPattern.test(lines[i])) {
        // Try the immediately following line first
        const v1 = lines[i + 1];
        // A value line should not itself be a pure all-caps label
        if (v1 && !/^[A-Z][A-Z\s\/\(\)]{3,}$/.test(v1)) return v1.trim();
        // Otherwise try the line after that
        if (lines[i + 2] && !/^[A-Z][A-Z\s\/\(\)]{3,}$/.test(lines[i + 2])) return lines[i + 2].trim();
      }
    }
    return '';
  }

  // ══ POLICY NUMBER ══
  // Strategy 1: next-line label (e.g. "CERTIFICATE NUMBER\nCFYAM24-8368292" or "CFYAM24 - 8368292")
  const numNextLine = nextLineValue(/^(?:CERTIFICATE|POLICY|REFERENCE|SCHEDULE|DOCUMENT)\s*(?:NUMBER|NO\.?|#|REF\.?)?$/i);
  if (numNextLine && /[A-Z0-9\-\s]{5,30}/.test(numNextLine) && !/^[\+0]/.test(numNextLine)) {
    // Match alphanumeric segments joined by optional-spaced hyphens: "CFYAM24 - 8368292", "POL-123456"
    const tok = numNextLine.match(/\b([A-Z]{1,8}\d*(?:\s*-\s*[A-Z0-9]+){1,4})\b/i) ||
                numNextLine.match(/\b([A-Z]{2,6}\d{5,12})\b/i) ||
                numNextLine.match(/\b(\d{8,12})\b/);
    if (tok) {
      // Normalise spaces around hyphens → no spaces
      number = tok[1].replace(/\s*-\s*/g, '-').toUpperCase();
    } else {
      number = numNextLine.split(' ')[0];
    }
  }

  // Strategy 2: inline label patterns
  if (!number) {
    const numPatterns = [
      /policy\s*(?:no\.?|number|#|ref\.?|id)?[\s:\-]*([A-Z]{1,6}[\-]?\d{5,12}[A-Z]?\d*)\b/i,
      /policy\s*(?:no\.?|number|#|ref\.?)[:\s\-]+([A-Z0-9][A-Z0-9\-\/]{4,18})/i,
      /(?:ref(?:erence)?|cert(?:ificate)?|schedule|doc(?:ument)?)\s*(?:no\.?|number|#)?[:\s\-]+([A-Z0-9][A-Z0-9\-\/]{4,18})/i,
    ];
    for (const r of numPatterns) {
      const m = flat.match(r);
      if (m) {
        const c = m[1].replace(/\s+/g, '').trim();
        if (!/^[\+0]/.test(c)) { number = c; break; }
      }
    }
  }

  // Strategy 3: shape-based fallback — also handles spaced hyphens in flat text
  if (!number) {
    // Match e.g. "CFYAM24 - 8368292" or "WN834106459"
    const m = flat.match(/\b([A-Z]{1,8}\d*(?:\s*-\s*[A-Z0-9]+){1,4})\b/i) ||
              flat.match(/\b([A-Z]{2,6}[\-]?\d{5,12})\b/);
    if (m && !/^[\+0]/.test(m[1])) number = m[1].replace(/\s*-\s*/g, '-').toUpperCase();
  }
  if (!number) {
    const m = flat.match(/\b(\d{8,12})\b/);
    if (m) number = m[1];
  }

  // ══ PHONE ══
  function cleanPhone(raw) {
    let p = raw.replace(/\s+/g, ' ').trim();
    p = p.replace(/[^0-9\+\(\)\-\s].*$/, '').trim();
    p = p.replace(/\s*\($/, '').trim();
    // Strip trailing 1-2 digit orphans (e.g. "24" from "24 hours, 365 days")
    p = p.replace(/\s+\d{1,2}$/, '').trim();
    return p;
  }

  const phonePatterns = [
    // "Medical Emergency/Repatriation\n+44 330 123 2370" — value on next line
    /Medical\s+Emergency[^\n]*\n\s*(\+?[\d][\d\s\-\(\)\.]{8,18})/i,
    // Emergency/assistance context with +44 nearby
    /(?:emergency|assistance)[^\n]{0,60}\n\s*(\+44[\s\d\-\(\)\.]{8,16})/i,
    // "+44 (0) XXXX" style
    /(\+44\s*\(0\)\s*[\d][\d\s\-]{6,14})/,
    // "+44 XXX" without (0)
    /(\+44\s?[\d\s\-]{9,14})/,
    // Claims phone context
    /(?:claim|claims)[^\n]{0,80}?(\+?[\d][\d\s\-\(\)\.]{8,16})/i,
    // "call us on / tel:" inline — lowest priority
    /(?:call\s+us\s+on|tel(?:ephone)?)[:\s]+(\+?[\d][\d\s\-\(\)\.]{7,16})/i,
    // UK numbers
    /\b(0(?:800|808|845|870|330|300|345|203|1\d{2,3}|2\d|3\d{2})[\s\d\-\(\)]{6,12})\b/,
  ];
  for (const r of phonePatterns) {
    const m = text.match(r);
    if (m) {
      const p = cleanPhone(m[1]);
      if ((p.match(/\d/g) || []).length >= 8 && (p.match(/\d/g) || []).length <= 15) {
        phone = p; break;
      }
    }
  }

  // ══ INSURER ══
  // Strategy 1: "issued by COMPANY" / "trading name of COMPANY" — stop at bracket or punctuation
  const insurerPatterns = [
    /issued\s+by\s+(CoverForYou|[A-Z][A-Za-z\s&\.\-']{2,45}?)(?:\s*[\(\,]|\s+an?\s|\s+insurance\s+intermediary)/i,
    /trading\s+name\s+of\s+([A-Z][A-Za-z\s&\.\-']{3,50}?)(?:\s*[\(\)]|\s+Limited|\s+Ltd|,)/i,
    /(?:sold\s+and\s+administered|administered)\s+by\s+([A-Z][A-Za-z\s&\.\-']{2,45}?)(?:\s+who|,|\n)/i,
    /(?:provided|underwritten)\s+by\s+([A-Z][A-Za-z\s&\.\-']{2,45}?)(?:\s*[\(\,]|\s+which\s+is|,|\n)/i,
    /^([A-Z][A-Za-z\s&]{3,35}(?:\s+Insurance|\s+Cover|\s+Assurance|\s+Direct|\s+Life))\s*$/m,
    /(?:insurer|insurance\s+company)[:\s]+([A-Za-z][A-Za-z\s&\.\-']{2,40}?)(?:\n|Ltd|PLC|Limited)/i,
  ];
  for (const r of insurerPatterns) {
    const m = text.match(r);
    if (m) {
      const candidate = m[1].trim().replace(/\s+/g, ' ');
      if (!/^(the|a|an|your|this|our|inter\s+partner)\b/i.test(candidate) && candidate.length > 3) {
        insurer = candidate; break;
      }
    }
  }

  // ══ EXPIRY DATE ══
  // Strategy 1: next-line value after "COVER PERIOD" label, then extract end date from range
  const coverPeriodLine = nextLineValue(/^COVER\s*PERIOD$/i);
  if (coverPeriodLine) {
    // Range: "24/10/2024 to 28/10/2024" — take the END date
    const rangeM = coverPeriodLine.match(/\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}\s+to\s+(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})/i);
    if (rangeM) expiry = parseDateToISO(rangeM[1]);
    // Single date
    if (!expiry) {
      const singleM = coverPeriodLine.match(/(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})/);
      if (singleM) expiry = parseDateToISO(singleM[1]);
    }
  }

  // Strategy 2: inline date range anywhere "DD/MM/YYYY to DD/MM/YYYY"
  if (!expiry) {
    const rangeM = flat.match(/\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}\s+to\s+(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})/i);
    if (rangeM) expiry = parseDateToISO(rangeM[1]);
  }

  // Strategy 3: labelled expiry keywords
  if (!expiry) {
    const datePatterns = [
      /travel\s+end\s+date[:\s]*(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})/i,
      /(?:cover(?:age)?\s+end(?:s)?|policy\s+end(?:s)?)[:\s\-]*(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})/i,
      /(?:expir(?:y|es?|ation|ed?)|valid\s+(?:until|to)|renewal\s+(?:date)?|end\s+date)[:\s\-]*(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})/i,
      /(?:expir(?:y|es?)|renewal)[:\s\-]*(\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2})/i,
    ];
    for (const r of datePatterns) {
      const m = flat.match(r);
      if (m) { expiry = parseDateToISO(m[1]); if (expiry) break; }
    }
  }

  // ══ POLICY TYPE ══
  if      (/\b(motor|vehicle|car\s+insur|comprehensive|third\s+party|road\s+risk)\b/.test(lower))           type = 'car';
  else if (/\b(travel|trip|holiday\s+insur|abroad|single\s+trip|annual\s+trip|repatriation|bronze|silver|gold)\b/.test(lower)) type = 'travel';
  else if (/\b(home|household|buildings|contents|landlord|property)\b/.test(lower))                          type = 'home';
  else if (/\b(private\s+medical|health\s+insur|dental|vision|bupa|axa\s+health)\b/.test(lower))            type = 'health';
  else if (/\b(life\s+insur|life\s+cover|death\s+benefit|whole\s+life|term\s+life)\b/.test(lower))          type = 'life';
  else if (/\b(pet|dog|cat|animal|veterinary)\b/.test(lower))                                                type = 'pet';
  else if (/\b(public\s+liability|employer|commercial|business\s+insur|trade)\b/.test(lower))               type = 'business';

  // ══ NOTES — extract useful supplementary fields ══
  // Premium: "£37.02 TOTAL PRICE" or "TOTAL PRICE\n£37.02" or "Premium: £16.73"
  const premNote = nextLineValue(/^TOTAL\s*PRICE/i);
  const premM = (premNote && premNote.match(/£([\d,\.]+)/)) ||
                flat.match(/£([\d,\.]+)\s*TOTAL\s*PRICE/i) ||
                flat.match(/TOTAL\s*PRICE[^\n£]{0,20}£([\d,\.]+)/i) ||
                flat.match(/premium[:\s]+£?([\d,\.]+)/i);
  if (premM) notes.push(`Premium: £${premM[1]}`);

  // Destination: next-line after "DESTINATIONS COVERED" label, or inline
  const destNext = nextLineValue(/^DESTINATIONS?\s*(COVERED)?$/i);
  if (destNext && destNext.length < 80) {
    notes.push(`Destination: ${destNext}`);
  } else {
    const destM = flat.match(/destination[s]?\s*(?:covered)?[:\s]+([^\n]{3,80}?)(?:\s+Policy\s+Type|\s+Travel|\s+Lead|\s+INSURED|$)/i);
    if (destM) notes.push(`Destination: ${destM[1].trim()}`);
  }

  // Lead insured person (first name on the list)
  const insuredM = text.match(/(?:lead\s+traveller|insured\s+person)[:\s\n]+(?:\d+[\.\s]*)?((?:Mr|Mrs|Ms|Miss|Dr)\.?\s+[A-Z][a-z]+(?:\s+[A-Z][a-z]+)+)/i) ||
                   text.match(/(?:^|\n)\s*01[\.\s]+((?:[A-Z][a-z]+\s+){1,3}[A-Z][a-z]+)/m);
  if (insuredM) notes.push(`Insured: ${insuredM[1].trim()}`);

  // ══ CONFIDENCE SCORE ══
  // Weighted by importance: policy number (30) + phone (20) + insurer (20) + expiry (20) + type (10)
  let confidence = 0;
  if (number)  confidence += 30;
  if (phone)   confidence += 20;
  if (insurer) confidence += 20;
  if (expiry)  confidence += 20;
  if (type && type !== 'other') confidence += 10;

  return { number, phone, insurer, expiry, type, notes: notes.join('\n'), confidence };
}

function parseDateToISO(str) {
  if (!str) return '';
  let m = str.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})$/);
  if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m = str.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);
  if (m) {
    const y = m[3].length === 2 ? '20' + m[3] : m[3];
    return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  }
  return '';
}

// ── Shared OCR pipeline ──
async function runOCR(blob, label) {
  showSheet(`
    <div class="sheet-title">📄 Scanning ${label}</div>
    <div class="sheet-sub">Reading text from your document. This can take 10–30 seconds depending on the image…</div>
    <div style="text-align:center;padding:24px 0">
      <div style="font-size:36px;animation:spin 1.5s linear infinite;display:inline-block">⏳</div>
    </div>
    <style>@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}</style>
  `);

  try {
    const worker = await Tesseract.createWorker('eng', 1, {
      logger: () => {},
      errorHandler: () => {},
    });
    await worker.setParameters({
      tessedit_pageseg_mode: '1',   // Automatic page segmentation
      preserve_interword_spaces: '1',
    });
    const { data: { text } } = await worker.recognize(blob);
    await worker.terminate();

    const extracted = extractPolicyData(text);
    showOCRResultSheet(extracted, text);
  } catch (err) {
    closeSheet();
    toast('⚠️ Scan failed — try a clearer image');
    renderAdd();
  }
}

// ── File input handlers ──
async function handleOCRFile(file) {
  if (!file) return;
  document.getElementById('fileInput').value = '';
  document.getElementById('fileInputCamera').value = '';

  const isPDF = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');

  if (isPDF) {
    showSheet(`
      <div class="sheet-title">📄 Reading PDF…</div>
      <div class="sheet-sub">Extracting text from your document…</div>
      <div style="text-align:center;padding:24px 0;font-size:32px">📖</div>
    `);
    try {
      // First: try reading the text layer directly (works for all digital/typed PDFs)
      const textLayerText = await extractTextFromPDF(file);
      const hasUsefulText = textLayerText.replace(/\s+/g, '').length > 50;

      if (hasUsefulText) {
        // Good — digital PDF, text layer extracted cleanly
        const extracted = extractPolicyData(textLayerText);
        showOCRResultSheet(extracted, textLayerText);
      } else {
        // Scanned/image PDF — fall back to OCR on rendered image
        updateSheetContent(`
          <div class="sheet-title">📄 Scanning PDF…</div>
          <div class="sheet-sub">This looks like a scanned document. Running OCR — this may take 15–30 seconds…</div>
          <div style="text-align:center;padding:24px 0">
            <div style="font-size:36px;animation:spin 1.5s linear infinite;display:inline-block">⏳</div>
          </div>
          <style>@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}</style>
        `);
        const blob = await pdfToImageBlob(file);
        await runOCR(blob, 'PDF');
      }
    } catch(e) {
      closeSheet();
      toast('⚠️ Could not read PDF');
      renderAdd();
    }
  } else {
    // Image file — preprocess then OCR
    const processed = await preprocessImageForOCR(file);
    await runOCR(processed, 'image');
  }
}

function updateSheetContent(html) {
  const sheet = document.getElementById('sheet');
  if (sheet) sheet.innerHTML = `<div class="sheet-handle"></div>${html}`;
}

document.getElementById('fileInput').addEventListener('change', e => {
  handleOCRFile(e.target.files[0]);
});
document.getElementById('fileInputCamera').addEventListener('change', e => {
  handleOCRFile(e.target.files[0]);
});

let pinBuffer = '';
let pinMode = 'unlock'; // unlock | set | confirm
let pinTemp = '';

function renderPinScreen(mode = 'unlock') {
  pinMode = mode;
  pinBuffer = '';
  // Only reset pinTemp when starting fresh — NOT when moving to confirm screen
  if (mode !== 'confirm') pinTemp = '';
  const titles = {
    unlock: ['Enter PIN', 'Enter your PIN to unlock Coverly'],
    set: ['Set a PIN', 'Choose a 4-digit PIN to secure your vault'],
    confirm: ['Confirm PIN', 'Enter your PIN again to confirm'],
  };
  const [title, sub] = titles[mode];

  document.getElementById('app').innerHTML = `
    <div class="pin-screen page">
      <div class="pin-logo">Cover<span>ly</span></div>
      <div class="pin-sub">${sub}</div>
      <div class="pin-dots" id="pinDots">
        ${[0,1,2,3].map(i => `<div class="pin-dot" id="pd${i}"></div>`).join('')}
      </div>
      <div class="pin-error" id="pinError"></div>
      <div class="pin-keypad">
        ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((k,i) => {
          if (k === '') return `<div></div>`;
          return `<button class="pin-key ${k==='⌫'?'danger':''}" onclick="pinTap('${k}')">${k}</button>`;
        }).join('')}
      </div>
      ${mode === 'unlock' ? `<button style="background:none;border:none;color:var(--text-3);font-size:13px;margin-top:24px;cursor:pointer" onclick="forgotPin()">Forgot PIN?</button>` : ''}
      ${mode === 'confirm' ? `<button style="background:none;border:none;color:var(--text-3);font-size:13px;margin-top:24px;cursor:pointer" onclick="renderPinScreen('set')">← Start over</button>` : ''}
    </div>
  `;
}

function pinTap(key) {
  haptic('light');
  if (key === '⌫') {
    pinBuffer = pinBuffer.slice(0, -1);
  } else {
    if (pinBuffer.length >= 4) return;
    pinBuffer += key;
  }
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 150);
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById(`pd${i}`);
    if (d) d.classList.toggle('filled', i < pinBuffer.length);
  }
}

function checkPin() {
  if (pinMode === 'unlock') {
    if (pinBuffer === appPin) {
      haptic('success');
      isUnlocked = true;
      renderHome();
    } else {
      haptic('error');
      document.getElementById('pinError').textContent = '❌ Wrong PIN';
      pinBuffer = '';
      updatePinDots();
    }
  } else if (pinMode === 'set') {
    haptic('light');
    pinTemp = pinBuffer;
    renderPinScreen('confirm');
  } else if (pinMode === 'confirm') {
    if (pinBuffer === pinTemp) {
      haptic('success');
      appPin = pinBuffer;
      localStorage.setItem('coverly_pin', appPin);
      localStorage.setItem('coverly_pin_enabled', '1');
      pinEnabled = true;
      isUnlocked = true;
      closeSheet();
      toast('🔐 PIN set successfully');
      renderSettings();
    } else {
      haptic('error');
      document.getElementById('pinError').textContent = '❌ PINs do not match — try again';
      pinBuffer = '';
      updatePinDots();
    }
  }
}

function forgotPin() {
  if (confirm('This will clear all saved data and remove your PIN. Continue?')) {
    localStorage.removeItem('coverly_pin');
    localStorage.removeItem('coverly_pin_enabled');
    const req = indexedDB.deleteDatabase('coverlyDB');
    req.onsuccess = () => location.reload();
  }
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
  catch { return d; }
}
