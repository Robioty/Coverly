async function exportCalendar() {
  const policies = await getPolicies();
  const withExpiry = policies.filter(p => p.expiry);

  if (withExpiry.length === 0) {
    toast('⚠️ No policies with expiry dates to export');
    return;
  }

  function toICSDate(dateStr) {
    // dateStr is YYYY-MM-DD — convert to YYYYMMDD for ICS all-day event
    return dateStr.replace(/-/g, '');
  }

  function escICS(str) {
    return (str || '').replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\n/g, '\\n');
  }

  function uid() {
    return `coverly-${Date.now()}-${Math.random().toString(36).slice(2)}@coverly`;
  }

  const dtStamp = new Date().toISOString().replace(/[-:.]/g, '').slice(0, 15) + 'Z';

  let events = [];

  for (const p of withExpiry) {
    const meta = getPolicyMeta(p.type);
    const expiryICS = toICSDate(p.expiry);
    // Expiry event (all-day)
    events.push([
      'BEGIN:VEVENT',
      `UID:${uid()}`,
      `DTSTAMP:${dtStamp}`,
      `DTSTART;VALUE=DATE:${expiryICS}`,
      `SUMMARY:${escICS(`${meta.icon} ${p.insurer || meta.label} — Policy Expires`)}`,
      `DESCRIPTION:${escICS(`Policy: ${p.number}${p.phone ? '\\nPhone: ' + p.phone : ''}${p.premium ? '\\nPremium: £' + Number(p.premium).toFixed(2) : ''}`)}`,
      'CATEGORIES:Insurance,Coverly',
      'BEGIN:VALARM',
      'TRIGGER:-P30D',
      'ACTION:DISPLAY',
      `DESCRIPTION:${escICS(`${p.insurer || meta.label} policy expires in 30 days`)}`,
      'END:VALARM',
      'END:VEVENT',
    ].join('\r\n'));

    // Renewal reminder 30 days before
    const renewDate = new Date(p.expiry);
    renewDate.setDate(renewDate.getDate() - 30);
    const renewICS = renewDate.toISOString().slice(0, 10).replace(/-/g, '');
    events.push([
      'BEGIN:VEVENT',
      `UID:${uid()}`,
      `DTSTAMP:${dtStamp}`,
      `DTSTART;VALUE=DATE:${renewICS}`,
      `SUMMARY:${escICS(`🔔 ${p.insurer || meta.label} — Renewal Reminder`)}`,
      `DESCRIPTION:${escICS(`${p.insurer || meta.label} (${p.number}) expires on ${formatDate(p.expiry)}. Good time to start comparing quotes.`)}`,
      'CATEGORIES:Insurance,Coverly',
      'END:VEVENT',
    ].join('\r\n'));
  }

  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Coverly//Insurance Vault//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    `X-WR-CALNAME:Coverly Insurance Renewals`,
    `X-WR-CALDESC:Policy expiry dates and renewal reminders from Coverly`,
    ...events,
    'END:VCALENDAR',
  ].join('\r\n');

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'coverly-renewals.ics';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);

  toast(`📅 Exported ${withExpiry.length} renewal date${withExpiry.length === 1 ? '' : 's'}`);
}

// ── Crypto helpers (Web Crypto API — all on-device, no network) ──
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 250000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

async function encryptData(plaintext, password) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const key  = await deriveKey(password, salt);
  const enc  = new TextEncoder();
  const ciphertext = await crypto.subtle.encrypt(
    { name: 'AES-GCM', iv }, key, enc.encode(plaintext)
  );
  // Pack: magic(8) + version(1) + salt(16) + iv(12) + ciphertext
  const magic = new TextEncoder().encode('COVERLY1');
  const buf = new Uint8Array(8 + 1 + 16 + 12 + ciphertext.byteLength);
  buf.set(magic, 0);
  buf.set([1], 8);          // version byte
  buf.set(salt, 9);
  buf.set(iv, 25);
  buf.set(new Uint8Array(ciphertext), 37);
  return buf;
}

async function decryptData(buf, password) {
  const magic = new TextDecoder().decode(buf.slice(0, 8));
  if (magic !== 'COVERLY1') throw new Error('Not a valid Coverly backup file');
  const salt       = buf.slice(9, 25);
  const iv         = buf.slice(25, 37);
  const ciphertext = buf.slice(37);
  const key        = await deriveKey(password, salt);
  const plainBuf   = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
  return new TextDecoder().decode(plainBuf);
}

async function doBackup() {
  const p1 = document.getElementById('bp1')?.value;
  const p2 = document.getElementById('bp2')?.value;
  const errEl = document.getElementById('backupErr');

  if (!p1 || p1.length < 6) { errEl.textContent = 'Password must be at least 6 characters'; return; }
  if (p1 !== p2) { errEl.textContent = 'Passwords do not match'; return; }

  errEl.textContent = '';
  const btn = document.querySelector('#sheet .btn-primary');
  if (btn) { btn.textContent = '⏳ Encrypting…'; btn.disabled = true; }

  try {
    const policies = await getPolicies();
    const allDocs = await getAllDocuments();
    // Serialize document binary data as base64 for JSON transport
    const docsForExport = allDocs.map(doc => ({
      ...doc,
      data: doc.data ? btoa(String.fromCharCode(...new Uint8Array(doc.data))) : null,
      _base64: true,
    }));
    const payload = JSON.stringify({ coverly: true, v: 3, exportedAt: Date.now(), policies, documents: docsForExport });
    const encrypted = await encryptData(payload, p1);

    // Download
    const blob = new Blob([encrypted], { type: 'application/octet-stream' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const date = new Date().toISOString().slice(0, 10);
    a.href     = url;
    a.download = `coverly-backup-${date}.coverly`;
    a.click();
    URL.revokeObjectURL(url);

    // Record last backup time
    localStorage.setItem('coverly_last_backup', Date.now().toString());

    // Show clear instructions — don't just toast, users need to know NOT to tap the file
    showSheet(`
      <div class="sheet-title">✅ Backup Downloaded!</div>
      <div class="sheet-sub">Your encrypted backup file has been saved to your Downloads folder.</div>

      <div class="card" style="margin-bottom:12px">

          <div style="display:flex;gap:10px;align-items:flex-start">
            <span style="font-size:20px;flex-shrink:0">1️⃣</span>

          </div>
          <div style="display:flex;gap:10px;align-items:flex-start">
            <span style="font-size:20px;flex-shrink:0">2️⃣</span>
            <div style="font-size:14px;line-height:1.5"><b>Don't tap the file to open it</b><br><span style="color:var(--text-2)">Android won't know what to do with a <b>.coverly</b> file. Always restore from inside Coverly instead.</span></div>
          </div>
          <div style="display:flex;gap:10px;align-items:flex-start">
            <span style="font-size:20px;flex-shrink:0">3️⃣</span>
            <div style="font-size:14px;line-height:1.5"><b>To restore</b><br><span style="color:var(--text-2)">Open Coverly → Settings → Restore from Backup → choose the file → enter your password.</span></div>
          </div>
        </div>
      </div>

      <div style="background:var(--amber-dim);border:1px solid rgba(245,158,11,0.25);border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;color:var(--text-2);line-height:1.5;margin-bottom:12px">
        🔑 <b style="color:var(--text)">Remember your password.</b> There is no way to recover your backup without it.
      </div>

      <button class="btn btn-primary" onclick="closeSheet()">Got it</button>
      <div style="font-size:12px;color:var(--text-3);margin-top:12px;line-height:1.5">
        📎 Attached documents are included in the backup. Files with many attachments may produce a larger backup file.
      </div>
    `);
  } catch (err) {
    if (btn) { btn.textContent = '⬇️ Download Backup File'; btn.disabled = false; }

async function doRestore() {
  const password = document.getElementById('rp')?.value;
  const errEl    = document.getElementById('restoreErr');

  if (!restoreFileBuffer) { errEl.textContent = 'Please choose a backup file first'; return; }
  if (!password)          { errEl.textContent = 'Please enter your backup password'; return; }

  const btn = document.getElementById('restoreBtn');
  if (btn) { btn.textContent = '⏳ Decrypting…'; btn.disabled = true; }
  errEl.textContent = '';

  try {
    const buf  = new Uint8Array(restoreFileBuffer);
    const json = await decryptData(buf, password);
    const data = JSON.parse(json);
    const list = data.policies || (Array.isArray(data) ? data : null);
    if (!list) throw new Error('Invalid backup structure');

    // Restore policies (strip old IDs so they get new ones)
    const idMap = {}; // oldId -> newId (for re-linking documents)
    for (const p of list) {
      const { id: oldId, ...rest } = p;
      const newId = await addPolicy(rest);
      if (oldId !== undefined) idMap[oldId] = newId;
    }

    // Restore documents if present
    if (Array.isArray(data.documents)) {
      for (const doc of data.documents) {
        const { id: _docId, policyId: oldPolicyId, data: b64data, _base64, ...docRest } = doc;
        const newPolicyId = idMap[oldPolicyId];
        if (newPolicyId === undefined) continue; // orphaned doc — skip
        let binData = null;
        if (b64data && _base64) {
          const binary = atob(b64data);
          binData = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) binData[i] = binary.charCodeAt(i);
          binData = binData.buffer;
        }
        await addDocument({ policyId: newPolicyId, data: binData, ...docRest });
      }
    }

    restoreFileBuffer = null;
    localStorage.setItem('coverly_last_backup', Date.now().toString());
    closeSheet();
    toast(`✅ Restored ${list.length} polic${list.length === 1 ? 'y' : 'ies'}`, 3000);
    activeTab = 'home';
    renderHome();
  } catch (err) {
    if (btn) { btn.textContent = '🔓 Restore Policies'; btn.disabled = false; }
    if (err.message?.includes('valid Coverly')) {
      errEl.textContent = 'This does not look like a Coverly backup file';
    } else {
      errEl.textContent = 'Wrong password or corrupted file';
    }
  }
}

// ── Backup prompt logic ──
// Shows a gentle non-blocking banner when:
//  • User is online
//  • There are policies to back up
//  • It's been 14+ days since last backup (or never backed up)
//  • The banner hasn't been dismissed in this session
let backupBannerShown = false;

async function maybeShowBackupPrompt() {
  if (backupBannerShown) return;
  if (!navigator.onLine) return;

  const policies = await getPolicies();
  if (policies.length === 0) return;

  const lastBackup = parseInt(localStorage.getItem('coverly_last_backup') || '0', 10);
  const daysSince  = lastBackup ? (Date.now() - lastBackup) / 86400000 : Infinity;

  if (daysSince < 14) return;

  backupBannerShown = true;
  showBackupBanner(lastBackup);
}

function showBackupBanner(lastBackup) {
  // Remove any existing banner
  document.getElementById('backupBanner')?.remove();

  const sub = lastBackup
    ? `Last backup: ${new Date(lastBackup).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })}`
    : 'You haven\'t backed up yet';

  const banner = document.createElement('div');
  banner.className = 'backup-banner';
  banner.id = 'backupBanner';
  banner.innerHTML = `
    <div class="backup-banner-icon">☁️</div>
    <div class="backup-banner-text">
      <div class="backup-banner-title">Back up your vault</div>
      <div class="backup-banner-sub">${sub}</div>
    </div>
    <div class="backup-banner-actions">
      <button class="backup-banner-btn primary" onclick="dismissBackupBanner();startBackup()">Back up</button>
      <button class="backup-banner-btn ghost" onclick="dismissBackupBanner()">Later</button>
    </div>
  `;
  document.body.appendChild(banner);
}

function dismissBackupBanner() {
  const b = document.getElementById('backupBanner');
  if (b) {
    b.style.animation = 'none';
    b.style.opacity = '0';
    b.style.transform = 'translateY(16px)';
    b.style.transition = 'opacity 0.2s, transform 0.2s';
    setTimeout(() => b.remove(), 200);
  }
}

/* ═══════════════════════════════════════
   NOTIFICATIONS
═══════════════════════════════════════ */
async function requestNotificationPermission() {
  if (!('Notification' in window)) {
    toast('⚠️ Notifications not supported in this browser');
    return false;
  }
  if (Notification.permission === 'granted') return true;
  const result = await Notification.requestPermission();
  return result === 'granted';
}

async function toggleAnnualReminder(enabled) {
  if (enabled) {
    const granted = await requestNotificationPermission();
    if (!granted) {
      toast('⚠️ Permission denied — enable notifications in browser settings');
      renderSettings(); return;
    }
    localStorage.setItem('coverly_notif_enabled', '1');
    // Schedule 1 year from now
    localStorage.setItem('coverly_next_annual', (Date.now() + 365 * 86400000).toString());
    toast('🔔 Annual reminder set');
  } else {
    localStorage.removeItem('coverly_notif_enabled');
    localStorage.removeItem('coverly_next_annual');
    toast('Reminder removed');
  }
  renderSettings();
}

async function toggleExpiryReminders(enabled) {
  if (enabled) {
    const granted = await requestNotificationPermission();
    if (!granted) {
      toast('⚠️ Permission denied — enable notifications in browser settings');
      renderSettings(); return;
    }
    localStorage.setItem('coverly_expiry_notif', '1');
    toast('🔔 Expiry alerts enabled');
  } else {
    localStorage.removeItem('coverly_expiry_notif');
    // Clear all previously fired notification markers so they re-fire if re-enabled
    Object.keys(localStorage)
      .filter(k => k.startsWith('coverly_notif_fired_'))
      .forEach(k => localStorage.removeItem(k));
    toast('Expiry alerts removed');
  }
  renderSettings();
}

// ── Check on every app open — no server needed, all on-device ──
async function checkDueNotifications() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const now = Date.now();

  // Annual policy check
  if (localStorage.getItem('coverly_notif_enabled') === '1') {
    const nextAnnual = parseInt(localStorage.getItem('coverly_next_annual') || '0', 10);
    if (nextAnnual && now >= nextAnnual) {
      new Notification('Coverly — Time for your annual policy check', {
        body: 'Do you have any new, changed or expired policies to update in your vault?',
        icon: 'icon-192-coverly.png',
        tag: 'annual-reminder',
        silent: false,
      });
      // Reschedule for next year
      localStorage.setItem('coverly_next_annual', (now + 365 * 86400000).toString());
    }
  }

  // Expiry alerts — 30, 14, 7 days before each policy expires
  if (localStorage.getItem('coverly_expiry_notif') === '1') {
    const policies = await getPolicies();
    for (const p of policies) {
      if (!p.expiry) continue;
      const days = Math.ceil((new Date(p.expiry) - new Date()) / 86400000);
      for (const threshold of [30, 14, 7]) {
        if (days > threshold || days < 0) continue;
        const firedKey = `coverly_notif_fired_${p.id}_${threshold}`;
        if (!localStorage.getItem(firedKey)) {
          const meta = getPolicyMeta(p.type);
          new Notification(`${meta.icon} Policy expiring in ${days} day${days === 1 ? '' : 's'}`, {
            body: `${p.insurer || meta.label} — ${p.number} expires on ${formatDate(p.expiry)}`,
            icon: 'icon-192-coverly.png',
            tag: `expiry-${p.id}-${threshold}`,
          });
          localStorage.setItem(firedKey, '1');
        }
      }
    }
  }
}

async function boot() {
  await initDB();
  getLocation();

  // ── File Handling API: if Coverly was launched by opening a .coverly file ──
  if ('launchQueue' in window) {
    window.launchQueue.setConsumer(async launchParams => {
      if (!launchParams.files || launchParams.files.length === 0) return;
      const fileHandle = launchParams.files[0];
      const file = await fileHandle.getFile();
      if (file.name.endsWith('.coverly')) {
        await initDB(); // ensure DB ready
        restoreFileBuffer = await file.arrayBuffer();
        // Show restore sheet pre-loaded with file
        startRestoreWithFile(file.name);
        return;
      }
    });
  }

  const onboarded = localStorage.getItem('coverly_onboarded');
  if (!onboarded) {
    renderOnboarding();
    return;
  }

  if (pinEnabled && !isUnlocked) {
    renderPinScreen('unlock');
    return;
  }

  // Seed demo data once if vault is empty
  const policies = await getPolicies();
  if (policies.length === 0 && !localStorage.getItem('coverly_demo_asked')) {
    localStorage.setItem('coverly_demo_asked', '1');
    // Show as a proper screen, not a timed popup
    showOnboardingDemoOffer();
    return;
  }

  await renderHome();
  setTimeout(maybeShowBackupPrompt, 1200);
  checkDueNotifications(); // on-device check, no server needed
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    // Force the SW to check for updates immediately on every page load
    reg.update();

    // When a new SW takes over (skipWaiting fired), reload so the new index.html is used
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      // Only reload if we're not in the middle of user input
      if (!document.querySelector('input:focus, textarea:focus')) {
        window.location.reload();
      }
    });
  }).catch(() => {});
}

boot();
