<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coverly">
<title>Coverly</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<style>
/* ── Design Tokens ── */
:root {
  --bg: #0a0f1e;
  --surface: #111827;
  --card: #161d2e;
  --card-hover: #1c2540;
  --border: rgba(255,255,255,0.07);
  --border-focus: rgba(99,179,237,0.5);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.15);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.15);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.12);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.12);
  --purple: #8b5cf6;
  --text: #f1f5f9;
  --text-2: #94a3b8;
  --text-3: #475569;
  --radius: 16px;
  --radius-sm: 10px;
  --nav-h: 72px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Scrollbars ── */
::-webkit-scrollbar { width: 0; }

/* ── Layout ── */
#app {
  min-height: 100dvh;
  padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 8px);
}

.page { animation: pageIn 0.22s ease both; }
@keyframes pageIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.container { padding: 16px; max-width: 600px; margin: 0 auto; }

/* ── Header ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,15,30,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 14px 16px;
  padding-top: calc(14px + env(safe-area-inset-top, 0px));
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }
.header-logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
.header-logo span { color: var(--red); }
.btn-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 17px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.btn-icon:active { background: var(--card-hover); }

/* ── Bottom Nav ── */
.nav {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  background: rgba(10,15,30,0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bottom);
  z-index: 100;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 0;
  background: none;
  border: none;
  color: var(--text-3);
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 500;
  cursor: pointer;
  transition: color 0.15s;
  letter-spacing: 0.2px;
  text-transform: uppercase;
}
.nav-btn.active { color: var(--text); }
.nav-btn .nav-icon { font-size: 22px; line-height: 1; }
.nav-btn.active .nav-icon { filter: drop-shadow(0 0 6px rgba(255,255,255,0.3)); }

/* ── Buttons ── */
button { cursor: pointer; font-family: 'DM Sans', sans-serif; }

.btn {
  width: 100%;
  padding: 15px 20px;
  margin: 6px 0;
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: -0.1px;
}
.btn:active { transform: scale(0.97); opacity: 0.85; }

.btn-primary { background: var(--red); color: #fff; }
.btn-blue { background: var(--blue); color: #fff; }
.btn-ghost { background: var(--card); border: 1px solid var(--border); color: var(--text); }
.btn-ghost-red { background: var(--red-dim); border: 1px solid rgba(239,68,68,0.25); color: var(--red); }
.btn-sm {
  width: auto;
  padding: 9px 16px;
  font-size: 13px;
  border-radius: var(--radius-sm);
  margin: 3px;
}

/* ── Cards ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin: 10px 0;
  overflow: hidden;
  transition: transform 0.15s, border-color 0.15s;
}
.card:active { transform: scale(0.99); }
.card-body { padding: 16px; }
.card-header { padding: 14px 16px 0; }

/* ── Policy Card ── */
.policy-card { cursor: pointer; }
.policy-card:active { border-color: var(--border-focus); }
.policy-type {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-2);
  margin-bottom: 6px;
}
.policy-name { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 4px; }
.policy-number {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text-2);
  background: rgba(255,255,255,0.05);
  padding: 4px 8px;
  border-radius: 6px;
  display: inline-block;
  margin-bottom: 10px;
}
.policy-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 20px;
  letter-spacing: 0.2px;
}
.badge-green { background: var(--green-dim); color: var(--green); }
.badge-amber { background: var(--amber-dim); color: var(--amber); }
.badge-red { background: var(--red-dim); color: var(--red); }
.badge-blue { background: var(--blue-dim); color: var(--blue); }
.policy-footer {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: rgba(0,0,0,0.15);
}

/* ── Inputs ── */
.field { margin: 10px 0; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-2);
  margin-bottom: 6px;
}
.field input, .field select, .field textarea {
  width: 100%;
  padding: 13px 14px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--border-focus);
}
.field select option { background: var(--surface); }
.field textarea { resize: none; min-height: 80px; }
.field input[type="date"] { color-scheme: dark; }

/* ── Section header ── */
.section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-3);
  padding: 18px 0 8px;
}

/* ── Emergency ── */
.emergency-hero {
  background: linear-gradient(135deg, #1a0a0a 0%, #2a0f0f 100%);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: var(--radius);
  padding: 24px 20px;
  margin: 12px 0;
  text-align: center;
}
.emergency-icon { font-size: 48px; margin-bottom: 8px; }
.emergency-title { font-size: 22px; font-weight: 700; color: var(--red); margin-bottom: 4px; }
.emergency-sub { font-size: 14px; color: var(--text-2); }
.location-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin: 10px 0;
  font-size: 13px;
  color: var(--text-2);
}
.location-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; box-shadow: 0 0 6px var(--green); }

/* ── Empty State ── */
.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-2);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.empty-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.empty-text { font-size: 14px; color: var(--text-2); line-height: 1.5; }

/* ── Home Hero ── */
.home-hero {
  background: linear-gradient(135deg, var(--card) 0%, #1a2035 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 6px;
}
.hero-greeting { font-size: 13px; color: var(--text-2); margin-bottom: 2px; }
.hero-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
.hero-count { font-size: 13px; color: var(--text-2); margin-top: 4px; }
.hero-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
.hero-action-btn {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.hero-action-btn span:first-child { font-size: 20px; }
.hero-action-btn:active { background: rgba(255,255,255,0.1); }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: calc(var(--nav-h) + var(--safe-bottom) + 14px);
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(30,40,60,0.95);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 200;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Modal / Sheet ── */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 150;
  backdrop-filter: blur(4px);
  opacity: 0;
  animation: fadeIn 0.2s forwards;
}
@keyframes fadeIn { to { opacity: 1; } }
.sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--border);
  padding: 0 16px calc(var(--safe-bottom) + 16px);
  z-index: 160;
  max-height: 90dvh;
  overflow-y: auto;
  animation: sheetUp 0.25s cubic-bezier(0.4,0,0.2,1) forwards;
}
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: none; } }
.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 16px;
}
.sheet-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 4px; }
.sheet-sub { font-size: 14px; color: var(--text-2); margin-bottom: 20px; }

/* ── Detail actions row ── */
.action-row { display: flex; gap: 8px; margin: 8px 0; }
.action-row .btn { margin: 0; }

/* ── PIN Screen ── */
.pin-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  padding: 40px 24px;
  gap: 0;
}
.pin-logo { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 6px; }
.pin-logo span { color: var(--red); }
.pin-sub { font-size: 15px; color: var(--text-2); margin-bottom: 40px; }
.pin-dots { display: flex; gap: 16px; margin-bottom: 40px; }
.pin-dot {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 2px solid var(--text-3);
  transition: background 0.15s, border-color 0.15s;
}
.pin-dot.filled { background: var(--text); border-color: var(--text); }
.pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 300px; }
.pin-key {
  aspect-ratio: 1;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 22px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: background 0.1s, transform 0.1s;
  display: flex; align-items: center; justify-content: center;
}
.pin-key:active { background: var(--card-hover); transform: scale(0.93); }
.pin-key.danger { color: var(--red); }
.pin-key.confirm { color: var(--green); }
.pin-error { color: var(--red); font-size: 14px; margin-top: -20px; margin-bottom: 20px; min-height: 20px; }

/* ── QR ── */
#qrCanvas { display: none; border-radius: 12px; max-width: 240px; margin: 0 auto; background: #fff; padding: 12px; }
#video { display: none; width: 100%; border-radius: var(--radius); max-height: 320px; object-fit: cover; }

/* ── Scan overlay ── */
.scan-frame {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  margin: 12px 0;
}
.scan-frame::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 2px solid var(--blue);
  border-radius: var(--radius);
  pointer-events: none;
}

/* ── Renewal chip ── */
.renewal-chip {
  font-size: 11px;
  color: var(--text-2);
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ── Settings rows ── */
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.settings-row:last-child { border-bottom: none; }
.settings-label { font-size: 15px; font-weight: 500; }
.settings-desc { font-size: 12px; color: var(--text-2); margin-top: 2px; }

/* ── Toggle ── */
.toggle {
  position: relative;
  width: 46px; height: 26px;
  flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 13px;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  left: 3px; top: 3px;
  background: var(--text-2);
  border-radius: 50%;
  transition: transform 0.2s, background 0.2s;
}
.toggle input:checked + .toggle-slider { background: var(--green-dim); border-color: var(--green); }
.toggle input:checked + .toggle-slider::before { transform: translateX(20px); background: var(--green); }

/* ── Divider ── */
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* ── Danger zone ── */
.danger-section { background: var(--red-dim); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius); padding: 16px; margin-top: 16px; }
.danger-title { font-size: 13px; font-weight: 700; color: var(--red); margin-bottom: 8px; letter-spacing: 0.3px; }

/* ── Onboarding ── */
.onboard-screen {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  padding: 32px 24px calc(var(--safe-bottom) + 24px);
}
.onboard-step { flex: 1; display: flex; flex-direction: column; justify-content: center; animation: pageIn 0.3s ease both; }
.onboard-icon { font-size: 64px; margin-bottom: 24px; }
.onboard-title { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 12px; line-height: 1.2; }
.onboard-text { font-size: 16px; color: var(--text-2); line-height: 1.6; margin-bottom: 32px; }
.onboard-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 24px; }
.onboard-dot { width: 6px; height: 6px; border-radius: 3px; background: var(--text-3); transition: width 0.2s, background 0.2s; }
.onboard-dot.active { width: 20px; background: var(--text); }

/* ── Responsive ── */
@media(min-width:600px){
  .container { padding: 20px 24px; }
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<canvas id="qrCanvas"></canvas>
<video id="video" playsinline autoplay muted></video>
<input type="file" id="fileInput" accept="image/*,application/pdf" style="display:none">
<input type="file" id="fileInputCamera" accept="image/*" capture="environment" style="display:none">

<script>
'use strict';

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let db = null;
let stream = null;
let locationStr = null;
let locationName = null;
let activeTab = 'home';
let appPin = localStorage.getItem('coverly_pin') || null;
let pinEnabled = localStorage.getItem('coverly_pin_enabled') === '1';
let isUnlocked = !pinEnabled;
let scanAnimId = null;
let pendingOCRData = null;
let editingPolicyId = null;

/* ═══════════════════════════════════════
   DATABASE
═══════════════════════════════════════ */
function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('coverlyDB', 2);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('policies')) {
        d.createObjectStore('policies', { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(); };
    req.onerror = reject;
  });
}

const store = (mode = 'readonly') => db.transaction('policies', mode).objectStore('policies');

function getPolicies() {
  return new Promise(res => {
    const r = store().getAll();
    r.onsuccess = () => res(r.result);
  });
}

function addPolicy(data) {
  return new Promise(res => {
    const r = store('readwrite').add({ ...data, createdAt: Date.now() });
    r.onsuccess = () => res(r.result);
  });
}

function updatePolicy(data) {
  return new Promise(res => {
    const r = store('readwrite').put(data);
    r.onsuccess = () => res();
  });
}

function deletePolicy(id) {
  return new Promise(res => {
    store('readwrite').delete(id);
    res();
  });
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
let toastTimer;
function toast(msg, duration = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}

/* ═══════════════════════════════════════
   LOCATION
═══════════════════════════════════════ */
function getLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    p => {
      locationStr = `${p.coords.latitude.toFixed(5)},${p.coords.longitude.toFixed(5)}`;
      // Reverse geocode with OpenStreetMap
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${p.coords.latitude}&lon=${p.coords.longitude}&format=json`)
        .then(r => r.json())
        .then(d => {
          locationName = d.address?.city || d.address?.town || d.address?.village || d.address?.county || 'Your location';
          renderIfHome();
        })
        .catch(() => { locationName = 'Location found'; });
    },
    () => { locationStr = null; }
  );
}

function renderIfHome() {
  if (activeTab === 'home') renderHome();
}

/* ═══════════════════════════════════════
   POLICY TYPES
═══════════════════════════════════════ */
const POLICY_TYPES = [
  { key: 'car', label: 'Car Insurance', icon: '🚗' },
  { key: 'health', label: 'Health Insurance', icon: '🏥' },
  { key: 'home', label: 'Home Insurance', icon: '🏠' },
  { key: 'life', label: 'Life Insurance', icon: '💚' },
  { key: 'travel', label: 'Travel Insurance', icon: '✈️' },
  { key: 'pet', label: 'Pet Insurance', icon: '🐾' },
  { key: 'business', label: 'Business Insurance', icon: '💼' },
  { key: 'other', label: 'Other', icon: '📋' },
];

function getPolicyMeta(key) {
  return POLICY_TYPES.find(t => t.key === key) || { key: 'other', label: 'Insurance', icon: '📋' };
}

function expiryBadge(expiry) {
  if (!expiry) return '';
  const d = new Date(expiry);
  const now = new Date();
  const days = Math.ceil((d - now) / 86400000);
  if (days < 0) return `<span class="badge badge-red">Expired</span>`;
  if (days <= 30) return `<span class="badge badge-amber">Expires in ${days}d</span>`;
  if (days <= 90) return `<span class="badge badge-blue">Expires in ${Math.round(days/30)}mo</span>`;
  return `<span class="badge badge-green">Active</span>`;
}

function startQRScan() {
  const area = document.getElementById('scanArea');
  if (!area) return;
  const vid = document.getElementById('video');
  area.innerHTML = `<div class="scan-frame"></div><button class="btn btn-ghost" onclick="stopCamera();document.getElementById('scanArea').innerHTML=''" style="margin-top:8px">✕ Cancel</button>`;
  area.querySelector('.scan-frame').appendChild(vid);
  vid.style.display = 'block';

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(s => {
      stream = s;
      vid.srcObject = s;
      vid.play();
      scanQRLoop();
    })
    .catch(() => toast('Camera permission denied'));
}

function scanQRLoop() {
  const vid = document.getElementById('video');
  if (!vid || !stream) return;
  if (vid.readyState === 4) {
    const c = document.createElement('canvas');
    c.width = vid.videoWidth; c.height = vid.videoHeight;
    c.getContext('2d').drawImage(vid, 0, 0);
    const d = c.getContext('2d').getImageData(0, 0, c.width, c.height);
    const code = jsQR(d.data, c.width, c.height);
    if (code) {
      stopCamera();
      importQRData(code.data);
      return;
    }
  }
  scanAnimId = requestAnimationFrame(scanQRLoop);
}

async function importQRData(raw) {
  try {
    const parsed = JSON.parse(raw);
    const list = parsed.coverly ? parsed.policies : parsed;
    if (!Array.isArray(list)) throw new Error();
    for (const p of list) {
      const { id, ...rest } = p;
      await addPolicy(rest);
    }
    toast(`✅ Imported ${list.length} polic${list.length === 1 ? 'y' : 'ies'}`);
    activeTab = 'home';
    renderHome();
  } catch {
    toast('⚠️ Invalid QR code');
    renderScan();
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (scanAnimId) { cancelAnimationFrame(scanAnimId); scanAnimId = null; }
  const vid = document.getElementById('video');
  if (vid) { vid.style.display = 'none'; vid.srcObject = null; }
}

// ── Image preprocessing: greyscale + contrast boost ──
function preprocessImageForOCR(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      // Scale down large images to max 2000px wide for speed
      const MAX = 2000;
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      // Convert to greyscale and boost contrast
      const id = ctx.getImageData(0, 0, w, h);
      const d = id.data;
      for (let i = 0; i < d.length; i += 4) {
        const grey = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
        // contrast stretch: make light→lighter, dark→darker
        const c = Math.min(255, Math.max(0, (grey - 128) * 1.4 + 128));
        d[i] = d[i+1] = d[i+2] = c;
      }
      ctx.putImageData(id, 0, 0);
      URL.revokeObjectURL(url);
      canvas.toBlob(resolve, 'image/png');
    };
    img.src = url;
  });
}

// ── Render PDF first page to canvas blob ──
async function pdfToImageBlob(file) {
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const page = await pdf.getPage(1);
  const viewport = page.getViewport({ scale: 2.0 }); // 2x scale for better OCR

  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;

  return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
}

// ── Master OCR extraction function ──
function extractPolicyData(rawText) {
  // Normalise: collapse multiple spaces/newlines to single space, trim
  const text = rawText.replace(/\r/g, '\n').replace(/[ \t]+/g, ' ');
  const flat = text.replace(/\n+/g, ' '); // single-line version for some patterns

  let number = '', phone = '', insurer = '', expiry = '', type = 'other';

  // ── Policy Number ──
  // Try labelled first
  const numPatterns = [
    /policy\s*(?:no\.?|number|#|ref\.?)[:\s\-]*([A-Z0-9][A-Z0-9\-\/\s]{4,18})/i,
    /(?:pol|ref|certificate)\s*(?:no\.?|number|#)?[:\s\-]*([A-Z0-9][A-Z0-9\-\/\s]{4,18})/i,
    /(?:document|schedule)\s+(?:no\.?|number)[:\s\-]*([A-Z0-9][A-Z0-9\-\/\s]{4,18})/i,
  ];
  for (const r of numPatterns) {
    const m = flat.match(r);
    if (m) { number = m[1].replace(/\s+/g, '').trim(); break; }
  }
  // Fallback: any plausible policy-number-shaped string (letters + digits, 6–16 chars)
  if (!number) {
    const m = flat.match(/\b([A-Z]{1,4}[\-\/]?\d{5,12}[A-Z]?)\b/);
    if (m) number = m[1];
  }
  if (!number) {
    // Pure digit string 8–12 chars
    const m = flat.match(/\b(\d{8,12})\b/);
    if (m) number = m[1];
  }

  // ── Phone ──
  const phonePatterns = [
    /(?:claim|claims|phone|tel(?:ephone)?|contact|call(?:us)?|helpline|emergency)[^\d\n]{0,15}(\+?[\d][\d\s\-\(\)\.]{7,17})/i,
    /(\+44\s?\d[\d\s\-]{8,13})/,
    /\b(0(?:800|808|118|1\d{2}|2\d{2}|3\d{2}|7\d{3}|8\d{2}|9\d{2})\s?[\d\s\-]{6,10})\b/,
    /(\+?1[\-\s]?\(?\d{3}\)?[\-\s]\d{3}[\-\s]\d{4})/,
  ];
  for (const r of phonePatterns) {
    const m = flat.match(r);
    if (m) {
      phone = m[1].replace(/\s+/g, ' ').trim();
      // Strip trailing garbage chars
      phone = phone.replace(/[^0-9\+\(\)\-\s].*$/, '').trim();
      break;
    }
  }

  // ── Insurer name ──
  const insurerPatterns = [
    /(?:insured\s+by|insurer|underwritten\s+by|provided\s+by|issued\s+by)[:\s]+([A-Za-z][A-Za-z\s&\.\-']{2,40}?)(?:\n|Ltd|PLC|plc|Ltd\.|Inc|Limited|Insurance|Group)/i,
    /^([A-Z][A-Za-z\s&\.]{3,35}(?:Insurance|Assurance|Mutual|Direct|Cover|Group|Life|Health))/m,
  ];
  for (const r of insurerPatterns) {
    const m = text.match(r);
    if (m) { insurer = m[1].trim().replace(/\s+/g, ' '); break; }
  }

  // ── Expiry / renewal date ──
  const datePatterns = [
    /(?:expir(?:y|es?|ation|ed?)|valid\s+(?:until|to)|renewal\s+(?:date)?|cover(?:age)?\s+ends?|end\s+date)[:\s\-]*(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})/i,
    /(?:expir(?:y|es?)|renewal)[:\s\-]*(\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2})/i,
    /(?:to|until)[:\s]+(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{4})/i,
  ];
  for (const r of datePatterns) {
    const m = flat.match(r);
    if (m) {
      expiry = parseDateToISO(m[1]);
      if (expiry) break;
    }
  }

  // ── Policy type heuristic from keywords ──
  const lower = flat.toLowerCase();
  if (/\b(car|motor|vehicle|auto|driving|road\s+risk)\b/.test(lower)) type = 'car';
  else if (/\b(home|household|building|content|property|landlord)\b/.test(lower)) type = 'home';
  else if (/\b(health|medical|dental|vision|private\s+medical)\b/.test(lower)) type = 'health';
  else if (/\b(life|death\s+benefit|whole\s+life|term\s+life)\b/.test(lower)) type = 'life';
  else if (/\b(travel|trip|holiday|abroad|flight)\b/.test(lower)) type = 'travel';
  else if (/\b(pet|dog|cat|animal|vet)\b/.test(lower)) type = 'pet';
  else if (/\b(business|liability|employer|commercial|trade)\b/.test(lower)) type = 'business';

  return { number, phone, insurer, expiry, type };
}

function parseDateToISO(str) {
  if (!str) return '';
  // Try yyyy-mm-dd or yyyy/mm/dd first
  let m = str.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})$/);
  if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  // dd/mm/yyyy or dd-mm-yyyy
  m = str.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);
  if (m) {
    const y = m[3].length === 2 ? '20' + m[3] : m[3];
    return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  }
  return '';
}

// ── Shared OCR pipeline ──
async function runOCR(blob, label) {
  showSheet(`
    <div class="sheet-title">📄 Scanning ${label}</div>
    <div class="sheet-sub">Reading text from your document. This can take 10–30 seconds depending on the image…</div>
    <div style="text-align:center;padding:24px 0">
      <div style="font-size:36px;animation:spin 1.5s linear infinite;display:inline-block">⏳</div>
    </div>
    <style>@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}</style>
  `);

  try {
    const worker = await Tesseract.createWorker('eng', 1, {
      logger: () => {},
      errorHandler: () => {},
    });
    await worker.setParameters({
      tessedit_pageseg_mode: '1',   // Automatic page segmentation
      preserve_interword_spaces: '1',
    });
    const { data: { text } } = await worker.recognize(blob);
    await worker.terminate();

    const extracted = extractPolicyData(text);
    showOCRResultSheet(extracted, text);
  } catch (err) {
    closeSheet();
    toast('⚠️ Scan failed — try a clearer image');
    renderAdd();
  }
}

// ── File input handlers ──
async function handleOCRFile(file) {
  if (!file) return;
  // Reset input so same file can be re-chosen
  document.getElementById('fileInput').value = '';
  document.getElementById('fileInputCamera').value = '';

  const isPDF = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');

  if (isPDF) {
    showSheet(`<div class="sheet-title">📄 Loading PDF…</div><div style="text-align:center;padding:24px;font-size:32px">📖</div>`);
    try {
      const blob = await pdfToImageBlob(file);
      await runOCR(blob, 'PDF');
    } catch(e) {
      closeSheet();
      toast('⚠️ Could not read PDF — is it a scanned/image PDF?');
    }
  } else {
    const processed = await preprocessImageForOCR(file);
    await runOCR(processed, 'image');
  }
}

document.getElementById('fileInput').addEventListener('change', e => {
  handleOCRFile(e.target.files[0]);
});
document.getElementById('fileInputCamera').addEventListener('change', e => {
  handleOCRFile(e.target.files[0]);
});

let pinBuffer = '';
let pinMode = 'unlock'; // unlock | set | confirm
let pinTemp = '';

function renderPinScreen(mode = 'unlock') {
  pinMode = mode;
  pinBuffer = '';
  pinTemp = '';
  const titles = {
    unlock: ['Enter PIN', 'Enter your PIN to unlock Coverly'],
    set: ['Set a PIN', 'Choose a 4-digit PIN to secure your vault'],
    confirm: ['Confirm PIN', 'Enter your PIN again to confirm'],
  };
  const [title, sub] = titles[mode];

  document.getElementById('app').innerHTML = `
    <div class="pin-screen page">
      <div class="pin-logo">Cover<span>ly</span></div>
      <div class="pin-sub">${sub}</div>
      <div class="pin-dots" id="pinDots">
        ${[0,1,2,3].map(i => `<div class="pin-dot" id="pd${i}"></div>`).join('')}
      </div>
      <div class="pin-error" id="pinError"></div>
      <div class="pin-keypad">
        ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((k,i) => {
          if (k === '') return `<div></div>`;
          return `<button class="pin-key ${k==='⌫'?'danger':''}" onclick="pinTap('${k}')">${k}</button>`;
        }).join('')}
      </div>
      ${mode === 'unlock' ? `<button style="background:none;border:none;color:var(--text-3);font-size:13px;margin-top:24px;cursor:pointer" onclick="forgotPin()">Forgot PIN?</button>` : ''}
    </div>
  `;
}

function pinTap(key) {
  if (key === '⌫') {
    pinBuffer = pinBuffer.slice(0, -1);
  } else {
    if (pinBuffer.length >= 4) return;
    pinBuffer += key;
  }
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 100);
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById(`pd${i}`);
    if (d) d.classList.toggle('filled', i < pinBuffer.length);
  }
}

function checkPin() {
  if (pinMode === 'unlock') {
    if (pinBuffer === appPin) {
      isUnlocked = true;
      renderHome();
    } else {
      document.getElementById('pinError').textContent = '❌ Wrong PIN';
      pinBuffer = '';
      updatePinDots();
    }
  } else if (pinMode === 'set') {
    pinTemp = pinBuffer;
    pinBuffer = '';
    renderPinScreen('confirm');
  } else if (pinMode === 'confirm') {
    if (pinBuffer === pinTemp) {
      appPin = pinBuffer;
      localStorage.setItem('coverly_pin', appPin);
      localStorage.setItem('coverly_pin_enabled', '1');
      pinEnabled = true;
      isUnlocked = true;
      closeSheet();
      toast('🔐 PIN set successfully');
      renderSettings();
    } else {
      document.getElementById('pinError').textContent = '❌ PINs do not match';
      pinBuffer = '';
      updatePinDots();
    }
  }
}

function forgotPin() {
  if (confirm('This will clear all saved data and remove your PIN. Continue?')) {
    localStorage.removeItem('coverly_pin');
    localStorage.removeItem('coverly_pin_enabled');
    const req = indexedDB.deleteDatabase('coverlyDB');
    req.onsuccess = () => location.reload();
  }
}

  `);
}

async function doLoadDemo() {
  closeSheet();
  await seedDemoData();
  toast('✅ 4 example policies loaded!');
  renderHome();
}
let deferredInstall = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstall = e;
});

function promptInstall() {
  if (deferredInstall) {
    deferredInstall.prompt();
    deferredInstall.userChoice.then(() => { deferredInstall = null; });
  } else {
    toast('Open in browser and use "Add to Home Screen"');
  }
}

/* ═══════════════════════════════════════
   UTILS
═══════════════════════════════════════ */
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
  catch { return d; }
}

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */
async function boot() {
  await initDB();
  getLocation();

  const onboarded = localStorage.getItem('coverly_onboarded');
  if (!onboarded) {
    renderOnboarding();
    return;
  }

  if (pinEnabled && !isUnlocked) {
    renderPinScreen('unlock');
    return;
  }

  // Seed demo data once if vault is empty and never seeded
  const policies = await getPolicies();
  if (policies.length === 0 && !localStorage.getItem('coverly_demo_asked')) {
    localStorage.setItem('coverly_demo_asked', '1');
    renderHome();
    setTimeout(confirmLoadDemo, 600);
    return;
  }

  renderHome();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

boot();
</script>
